<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mission Admin | Spark Protocol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/css/spark-site-shell.css?v=2" />
  <link rel="stylesheet" href="/assets/css/spark-city-admin.css?v=1" />
</head>
<body class="city-admin-page">
  <nav id="spark-auth-nav" class="comic-nav site-header" aria-label="Spark Protocol site navigation"></nav>

  <main class="city-admin-wrap">
    <header class="city-admin-hero">
      <span class="owner-issue-tag">Spark Protocol · Mission Channel</span>
      <h1>Mission Admin</h1>
      <p class="lede">Edit mission array JSON. Export and deploy to <code>assets/data/missions.json</code>. Schema: <code>docs/spark/MISSION_SCHEMA.md</code></p>
    </header>

    <section class="city-admin-panel">
      <h2>Missions JSON</h2>
      <textarea id="mission-json-editor" style="width:100%;min-height:420px;font-family:monospace;font-size:0.85rem;border:3px solid #050505;padding:0.75rem"></textarea>
      <div class="city-admin-export-row">
        <button type="button" class="city-admin-btn" id="btn-apply-json">Apply Draft</button>
        <button type="button" class="city-admin-btn" id="btn-export">Export missions.json</button>
        <button type="button" class="city-admin-btn alt" id="btn-add-template">+ Add Template Mission</button>
        <button type="button" class="city-admin-btn alt" id="btn-copy-prompt">Copy AI Prompt</button>
        <button type="button" class="city-admin-btn" id="btn-reload">Reload Server JSON</button>
        <a class="city-admin-btn alt" href="/spark-city-admin/">City Map Admin</a>
        <a class="city-admin-btn" href="/spark-owner/">Owner Panel</a>
      </div>
      <p class="city-admin-status" id="mission-admin-status" hidden></p>
    </section>
  </main>

  <script src="/assets/js/spark-site-shell.js?v=1"></script>
  <script src="/assets/js/spark-account-runtime.js?v=14"></script>
  <script src="/assets/js/spark-auth-nav.js?v=14"></script>
  <script src="/assets/js/spark-mission-admin.js?v=1"></script>
</body>
</html>
