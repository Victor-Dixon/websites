<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Log In | Spark Protocol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
:root{
  --ink:#08080b;
  --paper:#fff4d6;
  --cream:#ffeec2;
  --red:#ff3155;
  --blue:#2dd4ff;
  --yellow:#ffd12f;
  --purple:#7c3cff;
  --green:#32ff9c;
  --shadow:#151019;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  color:var(--ink);
  font-family:Impact,"Arial Black",system-ui,sans-serif;
  background:
    radial-gradient(circle at 20% 10%,rgba(255,49,85,.35) 0 8%,transparent 9%),
    radial-gradient(circle at 80% 20%,rgba(45,212,255,.32) 0 9%,transparent 10%),
    radial-gradient(circle at 70% 80%,rgba(255,209,47,.34) 0 10%,transparent 11%),
    linear-gradient(135deg,#20122d,#090912 55%,#190f13);
  overflow-x:hidden;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.19;
  background-image:radial-gradient(#fff 1px,transparent 1px);
  background-size:8px 8px;
  mix-blend-mode:screen;
}
.comic-nav{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  padding:12px;
  background:var(--ink);
  border-bottom:5px solid var(--yellow);
  box-shadow:0 6px 0 rgba(0,0,0,.45);
}
.comic-nav a{
  color:#fff;
  text-decoration:none;
  font-weight:950;
  letter-spacing:.03em;
  text-transform:uppercase;
  padding:8px 10px;
  border:3px solid transparent;
}
.comic-nav a:hover,.comic-nav .pop{
  color:var(--ink);
  background:var(--yellow);
  border-color:#fff;
  transform:rotate(-1deg);
}
.comic-wrap{
  width:min(1120px,calc(100% - 24px));
  margin:0 auto;
  padding:34px 0 76px;
}
.issue-tag{
  display:inline-block;
  background:var(--yellow);
  color:var(--ink);
  border:4px solid var(--ink);
  box-shadow:6px 6px 0 var(--ink);
  padding:8px 12px;
  transform:rotate(-2deg);
  text-transform:uppercase;
  font-size:.95rem;
  letter-spacing:.08em;
}
.comic-cover{
  position:relative;
  margin-top:24px;
  border:7px solid var(--ink);
  background:
    radial-gradient(circle at 76% 20%,rgba(255,255,255,.95) 0 8%,transparent 9%),
    linear-gradient(135deg,#ff3155 0 35%,#ffd12f 35% 58%,#2dd4ff 58% 100%);
  box-shadow:14px 14px 0 rgba(0,0,0,.65);
  padding:clamp(22px,5vw,54px);
  overflow:hidden;
}
.comic-cover:after{
  content:"SPARK!";
  position:absolute;
  right:-20px;
  bottom:16px;
  color:rgba(8,8,11,.12);
  font-size:clamp(5rem,16vw,13rem);
  transform:rotate(-11deg);
  line-height:.8;
}
h1{
  position:relative;
  z-index:2;
  margin:12px 0;
  font-size:clamp(3rem,12vw,8.8rem);
  line-height:.78;
  letter-spacing:-.08em;
  text-transform:uppercase;
  color:#fff;
  -webkit-text-stroke:3px var(--ink);
  text-shadow:7px 7px 0 var(--ink);
}
h2{
  margin:0 0 10px;
  font-size:clamp(1.7rem,5vw,3rem);
  line-height:.9;
  text-transform:uppercase;
}
p{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-weight:800;
  line-height:1.5;
}
.caption{
  position:relative;
  z-index:2;
  display:inline-block;
  max-width:780px;
  background:var(--paper);
  border:5px solid var(--ink);
  padding:14px 16px;
  box-shadow:8px 8px 0 var(--ink);
  font-size:1.08rem;
}
.comic-actions{
  position:relative;
  z-index:2;
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:24px;
}
.comic-button{
  display:inline-block;
  text-decoration:none;
  border:5px solid var(--ink);
  color:var(--ink);
  background:#fff;
  padding:13px 16px;
  box-shadow:6px 6px 0 var(--ink);
  text-transform:uppercase;
  font-weight:950;
  letter-spacing:.04em;
}
.comic-button.primary{background:var(--yellow)}
.comic-button.red{background:var(--red);color:#fff}
.comic-button.blue{background:var(--blue)}
.comic-button:hover{transform:translate(-2px,-2px);box-shadow:9px 9px 0 var(--ink)}
.panel-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:18px;
  margin-top:30px;
}
.comic-panel{
  background:var(--paper);
  border:6px solid var(--ink);
  box-shadow:9px 9px 0 rgba(0,0,0,.7);
  padding:18px;
  transform:rotate(var(--tilt,0deg));
}
.comic-panel:nth-child(1){--tilt:-1deg}
.comic-panel:nth-child(2){--tilt:1deg}
.comic-panel:nth-child(3){--tilt:-.5deg}
.comic-panel strong{
  display:inline-block;
  background:var(--ink);
  color:#fff;
  padding:6px 9px;
  margin-top:6px;
}
.speech{
  position:relative;
  background:#fff;
  border:5px solid var(--ink);
  border-radius:24px;
  padding:16px;
  box-shadow:7px 7px 0 rgba(0,0,0,.7);
}
.speech:after{
  content:"";
  position:absolute;
  bottom:-22px;
  left:34px;
  border-width:22px 18px 0 0;
  border-style:solid;
  border-color:var(--ink) transparent transparent transparent;
}
.form-panel{
  background:var(--paper);
  border:7px solid var(--ink);
  box-shadow:12px 12px 0 rgba(0,0,0,.7);
  padding:22px;
}
label{
  display:block;
  margin:14px 0 6px;
  text-transform:uppercase;
  font-weight:950;
}
input{
  width:100%;
  border:4px solid var(--ink);
  padding:13px;
  font-size:1rem;
  font-weight:800;
  background:#fff;
  color:var(--ink);
  box-shadow:4px 4px 0 rgba(0,0,0,.25) inset;
}
button{
  cursor:pointer;
  border:5px solid var(--ink);
  background:var(--yellow);
  color:var(--ink);
  padding:13px 16px;
  box-shadow:6px 6px 0 var(--ink);
  text-transform:uppercase;
  font-weight:950;
  margin-top:16px;
  font-family:Impact,"Arial Black",system-ui,sans-serif;
  letter-spacing:.04em;
}
.status{
  margin-top:14px;
  font-family:system-ui,sans-serif;
  font-weight:900;
}
.error{color:var(--red)}
  </style>
</head>
<body>
  <nav id="spark-auth-nav" class="comic-nav" aria-label="Spark Protocol">
    <a href="/">Cover</a>
    <a href="/spark-account/">Origin Rules</a>
    <a href="/spark-login/" class="pop">Log In</a>
    <a class="pop" href="/spark-signup/">Join The Universe</a>
  </nav>

  <main class="comic-wrap">
    <span class="issue-tag">Return Of The Hero</span>
    <section class="comic-cover">
      <h1>Log In</h1>
      <div class="caption">Resume your story. Your command post awaits in Meridian City.</div>
    </section>

    <section class="form-panel">
      <form method="post" action="/wp-login.php">
        <label for="user_login">Email or Hero Name</label>
        <input id="user_login" name="log" type="text" autocomplete="username" required>

        <label for="user_pass">Secret Passcode</label>
        <input id="user_pass" name="pwd" type="password" autocomplete="current-password" required>

        <input type="hidden" name="redirect_to" value="/spark-dashboard/">
        <input type="hidden" name="rememberme" value="forever">

        <button type="submit">Log In</button>
        <a class="comic-button" href="/spark-signup/">Create Account</a>
      </form>
    </section>
  </main>

<script id="sparkLoginRedirectPatch">
(function(){
  const params = new URLSearchParams(window.location.search);
  const DEFAULT_REDIRECT = "/spark-dashboard/";
  const redirect = params.get("redirect_to") || params.get("returnUrl") || DEFAULT_REDIRECT;
  const safe = redirect.startsWith("/") && !redirect.startsWith("//") ? redirect : DEFAULT_REDIRECT;
  const input = document.querySelector('input[name="redirect_to"]');
  if (input) input.value = safe;
})();
</script>
  <script src="/assets/js/spark-account-runtime.js?v=6"></script>
  <script src="/assets/js/spark-auth-nav.js?v=7"></script>
  <script id="sparkLoginAlreadyIn">
(function(){
  var runtime = window.SparkAccountRuntime;
  if (!runtime || typeof runtime.session !== "function") return;
  runtime.session().then(function(result){
    if (result.ok && result.data && result.data.logged_in) {
      var params = new URLSearchParams(window.location.search);
      var target = params.get("redirect_to") || params.get("returnUrl") || runtime.defaultPostLogin || "/spark-dashboard/";
      if (!target.startsWith("/") || target.startsWith("//")) target = "/spark-dashboard/";
      window.location.replace(target);
    }
  });
})();
</script>
</body>
</html>
