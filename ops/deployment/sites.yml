# Deployment configuration
deployment:
  default_deployer: unified
  stamp_path: .well-known/deploy.json
  stamp_fallback_path: deploy.json  # Fallback if .well-known blocked
  verification_timeout: 30
  verification_delay: 5  # Seconds to wait after deploy (for caching/CDN)
  retry_attempts: 3
  retry_backoff: 2  # Exponential backoff multiplier
  require_stamp: true  # Deployment fails if stamp not updated
  require_commit_match: true  # Verification must match commit SHA
