id: weareswarm_static_routes_hash_link_cleanup_001
title: "Convert WeAreSwarm hash links into real static routes"
status: active
priority: P1
executor: kids
lane: kids_planner
project: weareswarm.site
domain: weareswarm.site
repo: Victor-Dixon/websites
created_at: "2026-06-14"
updated_at: "2026-06-14"

summary: >
  The live WeAreSwarm landing page is deployed and passing smoke verification,
  but strict live verification found 40 HASH_ONLY_LINK issues. Convert the
  single-page JavaScript/hash navigation into real static routes so every
  visible navigation link and call-to-action has a real URL.

why_it_matters: >
  Real routes improve SEO, accessibility, link sharing, live verification,
  and investor/client trust. The page should not rely on href="#" buttons
  for production navigation.

kid_safe: true
parent_approved: true
ai_heavy_lift: true
copy_paste_ready: true
no_secret_required: true
no_billing_required: true
no_destructive_repo_action: true
no_live_trading_action: true

mission_type: copy_paste_agent_supervision
skill_tags:
  - html
  - static-sites
  - qa
  - live-verification
  - accessibility
  - seo
  - github

source_files:
  - routes/weareswarm/index.html
  - _deploy/weareswarm/index.html
  - runtime/scripts/live_site_verify.py
  - _reports/live_verify/weareswarm_root_strict_latest.json

target_routes:
  - /
  - /manifesto/
  - /start/
  - /challenge/
  - /proof/
  - /operators/
  - /kids/

agent_prompt: |
  You are working in the Victor-Dixon/websites repo.

  Task: Convert the WeAreSwarm landing page hash-only navigation into real static routes.

  Current problem:
  - Live site https://www.weareswarm.site passes smoke verification.
  - Strict verification reports 40 HASH_ONLY_LINK issues.
  - The page uses links like href="#" with onclick="nav('proof')".
  - Production links should use real URLs.

  Requirements:
  1. Update routes/weareswarm/index.html so visible nav links and CTA buttons use real route URLs:
     - /manifesto/
     - /start/
     - /challenge/
     - /proof/
     - /operators/
     - /kids/
  2. Create static route files:
     - routes/weareswarm/manifesto/index.html
     - routes/weareswarm/start/index.html
     - routes/weareswarm/challenge/index.html
     - routes/weareswarm/proof/index.html
     - routes/weareswarm/operators/index.html
     - routes/weareswarm/kids/index.html
  3. Keep the same visual style across all WeAreSwarm pages.
  4. Remove all href="#" links from the production HTML.
  5. Keep JavaScript enhancements only if links still work without JavaScript.
  6. Mirror needed changes into _deploy/weareswarm/ if that deploy artifact is still used.
  7. Run:
     python runtime/scripts/live_site_verify.py --base "https://www.weareswarm.site" --paths "/" --required-marker "Dream.OS" --required-marker "Join the Swarm" --required-marker "Proof Wall" --strict
  8. Acceptance target:
     - strict verifier returns PASS
     - 0 HASH_ONLY_LINK issues
     - all internal links return 200
     - CSS/style remains consistent
     - no secrets required
     - no destructive repo actions

acceptance_criteria:
  - "routes/weareswarm/index.html contains no href=\"#\" links"
  - "All primary navigation and CTA links use real static paths"
  - "Static route pages exist for manifesto, start, challenge, proof, operators, and kids"
  - "All new routes return HTTP 200 after deploy"
  - "runtime/scripts/live_site_verify.py strict mode reports 0 HASH_ONLY_LINK issues for the root page"
  - "Smoke verification remains PASS for / and /dreamos-services/"
  - "No secrets, billing, live trading, or destructive repo actions are required"

proof_required:
  - "Git commit hash"
  - "Screenshot or copy of strict verifier PASS output"
  - "Live URL check for https://www.weareswarm.site"
  - "Updated _reports/live_verify JSON report"

estimated_difficulty: medium
estimated_time_minutes: 45
points: 250
