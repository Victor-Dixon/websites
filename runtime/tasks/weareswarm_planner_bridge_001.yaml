id: weareswarm_planner_bridge_001
title: Wire planner output into WeAreSwarm public status data
lane: website_ops
target: runtime/content/weareswarm.site
status: active
intent: >
  Convert DreamVault planner governance output into a generated public status JSON
  consumed by the WeAreSwarm projects/tasks surfaces.
constraints:
  - no SSH deploy required in this lane
  - generated JSON only; preserve hardcoded fallback
  - tolerate missing planner artifacts
  - do not expose secrets
outputs:
  - runtime/content/weareswarm.site/data/swarm-status.generated.json
  - data/reports/weareswarm_planner_bridge/latest.md
verification:
  - generated JSON parses
  - contains projects and unfinished_tasks arrays
  - git diff limited to bridge/task/generated status artifacts
