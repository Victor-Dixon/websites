allowed_policies:
  static_only:
    allows:
      - static_file_upload
      - html_render
      - json_snapshot_upload
    blocks:
      - wp_plugin_install
      - wp_page_mutation_unless_wordpress

  wp_plugin_allowed:
    allows:
      - wp_plugin_install
      - wp_page_mutation
      - wp_uploads_snapshot
    blocks:
      - blind_static_overwrite

  review_before_wp_or_static:
    allows:
      - inspect_only
      - backup
      - classify
    blocks:
      - deploy_without_mode_decision

  repair_before_deploy:
    allows:
      - inspect_only
      - backup
      - repair
    blocks:
      - deploy_until_repaired
