version: 1
name: spark_protocol_product_map
site: maskzero.site
status: intake
source_docs:
  uploaded_docs_summary:
    - Spark Protocol v8.5 rules engine and test suite
    - deterministic character generation
    - deterministic combat capability
    - Exchange requisition procedure
    - battle simulator deterministic substrate
positioning:
  product_name: Spark Protocol
  short_pitch: Deterministic fantasy superhero generation and combat resolution engine.
  site_promise: Cinematic storytelling backed by auditable deterministic mechanics.
  backend_promise:
    - rule tables are invariant-tested
    - domain/flavor scoring is deterministic
    - combat capability is deterministic
    - Exchange purchases are budget-checked
    - battle odds use committed thresholds and arena swing caps
pages_to_design_later:
  home:
    role: product landing page
    intent: explain the system and route visitors to character generation / battle demo
  protocol:
    role: rules credibility page
    intent: show deterministic backbone without exposing too much backend detail
  character_generator:
    role: interactive product demo
    intent: convert visitors into users
  battle_sim:
    role: showcase feature
    intent: answer fan matchup questions through fair logic
  client_portal:
    role: paying-client handoff
    intent: show progress, preview pages, and collect feedback
safety:
  deploy_now: false
  design_now: false
  preserve_current_theme: true
  backup_before_changes: true
  no_theme_overwrite_without_promotion_plan: true
