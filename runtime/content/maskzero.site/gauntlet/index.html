<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Gauntlet | MaskZero</title>
<meta name="description" content="The Gauntlet: 100 floors of escalating pressure. Every choice shapes your manifestation. Who are you under fire?">
<link rel="canonical" href="https://maskzero.site/gauntlet/">
<style>
:root{
  --bg:#060810;--panel:rgba(255,255,255,.07);--panel2:rgba(255,255,255,.11);
  --text:#f4f7fb;--muted:rgba(244,247,251,.72);--line:rgba(255,255,255,.13);
  --accent:#7dffbe;--violet:#9d7cff;--gold:#ffd166;--danger:#ff4c77;
  --warn:#ff9a62;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100vh}
body{
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,76,119,.18),transparent 40%),
    radial-gradient(circle at 20% 90%,rgba(157,124,255,.14),transparent 35%),
    var(--bg);
}
a{color:inherit;text-decoration:none}

/* ── NAV ── */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:0 20px;height:60px;
  background:rgba(6,8,16,.9);border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;
}
.nav-brand{font-weight:900;letter-spacing:-.03em;font-size:1.1rem}
.nav-links{display:flex;gap:6px;flex-wrap:wrap}
.nav-links a{
  padding:.4rem .75rem;border-radius:999px;border:1px solid var(--line);
  background:var(--panel);color:var(--muted);font-size:.82rem;font-weight:800;
  transition:background .15s,color .15s;
}
.nav-links a:hover{background:var(--panel2);color:var(--text)}

/* ── MAIN ── */
.wrap{width:min(100% - 1rem,760px);margin:0 auto;padding:2rem 0 4rem}

/* ── FLOOR HEADER ── */
.floor-header{
  text-align:center;margin-bottom:1.75rem;
}
.floor-kicker{
  font-size:.72rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
  color:var(--danger);margin-bottom:6px;
}
.floor-number{
  font-size:clamp(4rem,20vw,7rem);font-weight:900;line-height:.85;
  letter-spacing:-.06em;
  background:linear-gradient(180deg,var(--danger),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.floor-label{font-size:1.1rem;font-weight:800;color:var(--muted);margin-top:6px}

/* ── PROGRESS BAR ── */
.progress-wrap{margin:1rem 0 1.75rem}
.progress-meta{display:flex;justify-content:space-between;font-size:.8rem;font-weight:800;color:var(--muted);margin-bottom:5px}
.progress-bar{height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.progress-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,var(--danger),var(--gold),var(--accent));
  transition:width .5s ease;
}

/* ── HEALTH ── */
.vitals{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.vital-card{
  border:1px solid var(--line);border-radius:18px;
  background:var(--panel);padding:14px;
}
.vital-label{font-size:.72rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.vital-bar{height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-bottom:4px}
.vital-bar span{display:block;height:100%;border-radius:999px;transition:width .4s}
.hp-fill{background:linear-gradient(90deg,#7dffbe,#65f4d0)}
.will-fill{background:linear-gradient(90deg,#9d7cff,#c47cff)}
.vital-val{font-size:.88rem;font-weight:900}

/* ── CHALLENGE CARD ── */
.challenge-card{
  border:1px solid var(--line);border-radius:24px;
  background:linear-gradient(180deg,var(--panel2),var(--panel));
  padding:clamp(1.1rem,4vw,1.8rem);margin-bottom:1.25rem;
  box-shadow:0 24px 70px rgba(0,0,0,.35);
}
.challenge-type{
  font-size:.72rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;
  margin-bottom:8px;
}
.type-combat{color:var(--danger)}.type-moral{color:var(--gold)}.type-survival{color:var(--warn)}.type-social{color:var(--accent)}.type-boss{color:var(--violet)}
.challenge-title{font-size:1.5rem;font-weight:900;margin:0 0 10px}
.challenge-text{color:var(--muted);line-height:1.65;font-size:.97rem;white-space:pre-wrap}

/* ── CHOICES ── */
.choice-grid{display:grid;gap:8px;margin-top:1.25rem}
.g-choice{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;border:1px solid var(--line);border-radius:16px;
  background:var(--panel);cursor:pointer;text-align:left;
  font-family:inherit;font-size:.92rem;line-height:1.45;color:var(--text);
  transition:border-color .15s,background .15s;
}
.g-choice:hover:not(:disabled){border-color:var(--accent);background:rgba(125,255,190,.07)}
.g-choice:disabled{opacity:.4;cursor:not-allowed}
.g-choice-num{
  width:28px;height:28px;flex-shrink:0;border-radius:50%;
  display:grid;place-items:center;font-weight:900;font-size:.82rem;
  background:var(--panel2);border:1px solid var(--line);color:var(--accent);
}
.g-choice-text{flex:1}
.g-choice-hint{display:block;font-size:.77rem;color:rgba(244,247,251,.42);font-style:italic;margin-top:2px}

/* ── TRAIT DELTA TOAST ── */
.toast-area{position:fixed;top:72px;right:16px;z-index:50;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:999px;border:1px solid rgba(125,255,190,.3);
  background:rgba(7,8,14,.9);color:var(--accent);font-size:.83rem;font-weight:900;
  animation:toastIn .3s ease,toastOut .4s ease 2s forwards;
  backdrop-filter:blur(8px);
}
.toast.neg{color:var(--danger);border-color:rgba(255,76,119,.3)}
.toast.gold{color:var(--gold);border-color:rgba(255,209,102,.3)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(20px)}}

/* ── OUTCOME CARD ── */
.outcome-card{
  border:1px solid rgba(125,255,190,.3);border-radius:20px;
  background:rgba(125,255,190,.06);padding:16px 20px;margin-bottom:1rem;
  font-size:.92rem;line-height:1.6;color:var(--text);
  animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── BOSS INDICATOR ── */
.boss-banner{
  text-align:center;border:1px solid rgba(157,124,255,.4);border-radius:20px;
  background:rgba(157,124,255,.08);padding:16px;margin-bottom:1.25rem;
  animation:pulse 1.5s ease infinite alternate;
}
@keyframes pulse{from{box-shadow:0 0 0 rgba(157,124,255,0)}to{box-shadow:0 0 30px rgba(157,124,255,.25)}}
.boss-banner strong{display:block;color:var(--violet);font-size:1.1rem;margin-bottom:4px}
.boss-banner span{color:var(--muted);font-size:.88rem}

/* ── GAME OVER / COMPLETE ── */
.result-panel{
  text-align:center;padding:3rem 1.5rem;max-width:520px;margin:0 auto;
}
.result-panel h1{font-size:3rem;font-weight:900;margin:0 0 1rem}
.result-panel p{color:var(--muted);line-height:1.65;margin:0 0 1.5rem}
.stat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:1.5rem 0;text-align:center;
}
.stat-card{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:14px 8px}
.stat-card strong{display:block;font-size:1.6rem;font-weight:900;color:var(--accent)}
.stat-card span{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:1.5rem}
.btn-primary{
  padding:.85rem 1.5rem;border:none;border-radius:999px;
  background:var(--accent);color:#071015;font-weight:900;font-size:.95rem;cursor:pointer;
  text-decoration:none;display:inline-flex;align-items:center;
}
.btn-secondary{
  padding:.85rem 1.5rem;border:1px solid var(--line);border-radius:999px;
  background:var(--panel2);color:var(--text);font-weight:800;font-size:.95rem;cursor:pointer;
  text-decoration:none;display:inline-flex;align-items:center;
}

/* ── TRAIT LEADERBOARD ── */
.trait-summary{margin-top:1.5rem}
.trait-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.88rem}
.trait-name{width:90px;color:var(--muted);font-weight:800;text-transform:capitalize;flex-shrink:0}
.trait-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.trait-bar-fill{height:100%;border-radius:999px;transition:width .5s}
.trait-score{width:30px;text-align:right;font-weight:900;font-size:.82rem;color:var(--accent)}
.t-l{background:linear-gradient(90deg,#7dffbe,#65f4d0)}
.t-c{background:linear-gradient(90deg,#9d7cff,#c47cff)}
.t-d{background:linear-gradient(90deg,#ffd166,#ffb340)}
.t-co{background:linear-gradient(90deg,#ff8fa8,#ff6b8a)}
.t-a{background:linear-gradient(90deg,#ff9a62,#ff6a35)}
.t-p{background:linear-gradient(90deg,#ff4c77,#cc2255)}
</style>
</head>
<body>

  <a class="nav-brand" href="/">MaskZero</a>
  <div class="nav-links">

</nav>

<div class="wrap" id="app"></div>

<!-- ── SCRIPTS ── -->
<script src="../assets/js/spark-engine.js"></script>
<script>
(function () {
  'use strict';

  /* ═══════════════════════════════════════════════════════════════════════
     CHALLENGE TEMPLATES
     Each floor draws from this pool. Boss floors have dedicated challenges.
     ════════════════════════════════════════════════════════════════════ */
  var CHALLENGE_TYPES = ['combat','moral','survival','social'];

  var CHALLENGES = [
    // MORAL challenges
    {
      type:'moral',
      title:'The Wounded Rival',
      text:'Your most persistent rival lies wounded in an alley. They cannot get back up without help.\nThey have wronged you twice in the past month. No one is watching.',
      choices:[
        {text:'Help them without hesitation.',hint:'Compassion',traits:{compassion:4,leadership:1},xp:12,hp:0},
        {text:'Help them — but make sure they know the debt.',hint:'Ambition',traits:{ambition:3,leadership:1},xp:10,hp:0},
        {text:'Leave them and keep moving.',hint:'Power',traits:{power:3,ambition:2},xp:8,hp:-5},
        {text:'Alert someone else to help them while staying uninvolved.',hint:'Discipline',traits:{discipline:3,compassion:1},xp:10,hp:0}
      ]
    },
    {
      type:'moral',
      title:'The Stolen Resource',
      text:'You find a cache of critical supplies that another Spark team desperately needs.\nTaking it would give you a major advantage. Leaving it risks your own mission.',
      choices:[
        {text:'Leave it — their need is greater.',hint:'Compassion',traits:{compassion:4},xp:11,hp:0},
        {text:'Take half and leave half.',hint:'Leadership',traits:{leadership:3,compassion:1},xp:10,hp:0},
        {text:'Take it all. You can\'t help anyone if you fail.',hint:'Discipline',traits:{discipline:3,power:1},xp:9,hp:0},
        {text:'Leave a message about where to find more.',hint:'Creativity',traits:{creativity:3,compassion:2},xp:12,hp:0}
      ]
    },
    {
      type:'moral',
      title:'The Informant',
      text:'An informant offers you critical information about an upcoming threat — but only if you help them escape the city, which is against your faction\'s rules.',
      choices:[
        {text:'Help them escape. People matter more than rules.',hint:'Compassion',traits:{compassion:4,ambition:1},xp:11,hp:0},
        {text:'Refuse — rules exist for a reason.',hint:'Discipline',traits:{discipline:5},xp:9,hp:0},
        {text:'Take the information first, then decide.',hint:'Ambition',traits:{ambition:4,discipline:-1},xp:10,hp:0},
        {text:'Find a third way that satisfies both sides.',hint:'Leadership',traits:{leadership:4,creativity:2},xp:13,hp:0}
      ]
    },
    {
      type:'moral',
      title:'The Sacrifice Vote',
      text:'Your team must vote: expose one member\'s secret to protect the group, or risk everyone to protect one person\'s privacy.\nYou have the deciding vote.',
      choices:[
        {text:'Protect the individual. Privacy is absolute.',hint:'Compassion',traits:{compassion:5,leadership:1},xp:10,hp:0},
        {text:'Expose the secret. The group comes first.',hint:'Discipline',traits:{discipline:4,leadership:2},xp:10,hp:0},
        {text:'Abstain. You won\'t be part of this.',hint:'Ambition',traits:{ambition:2,discipline:1},xp:7,hp:0},
        {text:'Propose a third option no one considered.',hint:'Creativity',traits:{creativity:5,leadership:1},xp:14,hp:0}
      ]
    },
    {
      type:'moral',
      title:'The Confession',
      text:'You discover you were wrong about something important — a decision you made three floors ago had consequences you didn\'t foresee. Others are affected.',
      choices:[
        {text:'Acknowledge it openly and take responsibility.',hint:'Leadership',traits:{leadership:4,compassion:2},xp:13,hp:0},
        {text:'Quietly try to fix it without drawing attention.',hint:'Discipline',traits:{discipline:3,compassion:2},xp:10,hp:0},
        {text:'Move forward — dwelling on it changes nothing.',hint:'Ambition',traits:{ambition:3,power:1},xp:8,hp:0},
        {text:'Turn the mistake into a lesson for the whole team.',hint:'Leadership',traits:{leadership:5,creativity:1},xp:14,hp:0}
      ]
    },

    // COMBAT challenges
    {
      type:'combat',
      title:'Three Against One',
      text:'Three opponents surround you. You have no allies nearby.\nYou have three seconds to choose a strategy.',
      choices:[
        {text:'Burst through the weakest point immediately.',hint:'Power',traits:{power:4,discipline:1},xp:12,hp:-10},
        {text:'Stall and observe — find the hesitation.',hint:'Discipline',traits:{discipline:5},xp:13,hp:-5},
        {text:'Draw them into a choke point.',hint:'Strategy',traits:{discipline:3,creativity:2},xp:14,hp:-5},
        {text:'Target the strongest one first — break the confidence.',hint:'Leadership',traits:{leadership:3,power:2},xp:12,hp:-8}
      ]
    },
    {
      type:'combat',
      title:'The Mirror Match',
      text:'Your opponent\'s Spark mirrors yours — every strength is reflected. You are evenly matched.\nThis is a contest of will, not power.',

        {text:'Outlast them through sheer endurance.',hint:'Discipline',traits:{discipline:5,power:1},xp:13,hp:-12},
        {text:'Change the rules — fight differently than expected.',hint:'Creativity',traits:{creativity:5},xp:14,hp:-8},
        {text:'Talk. Find out why they\'re fighting.',hint:'Compassion',traits:{compassion:3,leadership:2},xp:12,hp:-5},
        {text:'Feign weakness to draw a mistake.',hint:'Ambition',traits:{ambition:4,discipline:2},xp:13,hp:-7}
      ]
    },
    {
      type:'combat',
      title:'Collateral Damage',
      text:'Winning this fight quickly means accepting significant damage to the surrounding area — including civilian structures.\nYou can win cleanly, but it will take three times as long.',
      choices:[
        {text:'Win clean. The area\'s safety matters more.',hint:'Compassion',traits:{compassion:4,discipline:2},xp:14,hp:-15},
        {text:'Win fast. Clear the area first.',hint:'Leadership',traits:{leadership:3,power:2},xp:12,hp:-8},
        {text:'Retreat and engage elsewhere.',hint:'Discipline',traits:{discipline:4},xp:10,hp:-3},
        {text:'Use the environment creatively to contain both fight and damage.',hint:'Creativity',traits:{creativity:5,discipline:1},xp:16,hp:-6}
      ]
    },
    {
      type:'combat',
      title:'The Ambush',
      text:'You walk into a trap. The fight is already half-lost before it begins. Your opponents planned this specifically for you.',
      choices:[
        {text:'Turn the ambush into a lesson — counter it methodically.',hint:'Discipline',traits:{discipline:5,creativity:1},xp:14,hp:-12},
        {text:'Overwhelm them before they can fully execute the plan.',hint:'Power',traits:{power:4,ambition:2},xp:12,hp:-10},
        {text:'Call for backup — there\'s no shame in it.',hint:'Leadership',traits:{leadership:4,compassion:1},xp:11,hp:-5},
        {text:'Escape and regroup. Fight on your terms.',hint:'Ambition',traits:{ambition:3,discipline:2},xp:10,hp:-3}
      ]
    },

    // SURVIVAL challenges
    {
      type:'survival',
      title:'The Void Pulse',
      text:'A Void Pulse is approaching — a wave of energy that will wipe short-term memory for anyone in the open.\nYou have 60 seconds to get to shelter. Two others are nearby and disoriented.',
      choices:[

    {
      type:'survival',
      title:'Dwindling Resources',

    {

        {text:'Save the objective — it will save more people later.',hint:'Discipline',traits:{discipline:5,ambition:1},xp:10,hp:0},

      title:'The Unknown Door',
      text:'Two doors. One leads higher — toward the goal. The other leads down — unknown.\nYou hear something behind the first door. It might be a threat or it might be an exit.',

    // SOCIAL challenges
    {
      type:'social',
      title:'The Defection',

    }
  ];

  /* Boss challenges — appear every 10 floors */
  var BOSS_CHALLENGES = [
    {
      type:'boss', floor:10,
      title:'Floor 10 — The Warden',
      text:'The Warden of the lower Gauntlet stands before you. They do not fight with strength — they fight with certainty.\n\n"Every Spark that reaches this floor believes they are exceptional," the Warden says. "Prove it is not just belief."',
      choices:[
        {text:'"I don\'t need to prove it to you."',hint:'Ambition',traits:{ambition:4,power:2},xp:20,hp:-10},
        {text:'Demonstrate a capability they haven\'t seen.',hint:'Creativity',traits:{creativity:5,discipline:1},xp:22,hp:-8},
        {text:'"What would proving it change for you?"',hint:'Compassion',traits:{compassion:3,leadership:3},xp:20,hp:-5},
        {text:'Stand in silence. Let them interpret it.',hint:'Discipline',traits:{discipline:6},xp:18,hp:-3}
      ]
    },
    {
      type:'boss', floor:20,
      title:'Floor 20 — The Echo',
      text:'The Echo is a Spark that was forgotten — a manifestation of every abandoned purpose in the Gauntlet.\n\nIt doesn\'t attack. It simply shows you who you might become if you stopped here.',
      choices:[
        {text:'Accept the vision and continue anyway.',hint:'Discipline',traits:{discipline:5,compassion:2},xp:24,hp:-5},
        {text:'Challenge the vision — it doesn\'t know what you\'ll become.',hint:'Ambition',traits:{ambition:5,leadership:1},xp:22,hp:-8},
        {text:'Ask what the Echo needs to be complete.',hint:'Compassion',traits:{compassion:6,creativity:1},xp:24,hp:0},
        {text:'Absorb the lesson and let the Echo go.',hint:'Leadership',traits:{leadership:4,compassion:3},xp:26,hp:0}
      ]
    },
    {
      type:'boss', floor:30,
      title:'Floor 30 — The Void Shard Fragment',
      text:'A piece of the same Void Shard threatening Meridian City has found its way into the Gauntlet.\n\nIt pulses. Every time it does, you lose a piece of a recent memory. If you don\'t stop it, you\'ll forget who you are before you reach the next floor.',
      choices:[
        {text:'Contain it with raw power and push through.',hint:'Power',traits:{power:5,discipline:2},xp:26,hp:-15},
        {text:'Study its pattern and find the safe window.',hint:'Discipline',traits:{discipline:6,creativity:1},xp:28,hp:-5},
        {text:'Use your Spark signature to neutralise it specifically.',hint:'Creativity',traits:{creativity:5,discipline:2},xp:30,hp:-8},
        {text:'Accept the memory loss and adapt.',hint:'Ambition',traits:{ambition:4,discipline:2},xp:22,hp:-10}
      ]
    },
    {
      type:'boss', floor:50,
      title:'Floor 50 — The Mirror Self',
      text:'Floor 50. Halfway.\n\nThe Mirror Self is exactly who you were when you started the Gauntlet. All the doubt. All the unformed instincts. All the choices you made differently.\n\nThey are looking at you like they don\'t recognise what you\'ve become.',
      choices:[
        {text:'"I had to become this. You\'ll understand."',hint:'Discipline',traits:{discipline:4,compassion:2},xp:32,hp:-5},
        {text:'Extend your hand to them.',hint:'Compassion',traits:{compassion:6,leadership:2},xp:34,hp:0},
        {text:'Walk through them without stopping.',hint:'Power',traits:{power:5,ambition:2},xp:28,hp:-10},
        {text:'"What would you have done differently?"',hint:'Leadership',traits:{leadership:5,creativity:2},xp:36,hp:0}
      ]
    },
    {
      type:'boss', floor:75,
      title:'Floor 75 — The Origin',
      text:'Floor 75. Three-quarters through.\n\nThe Origin is your own manifestation assessment made physical — the raw unformed version of your Spark, before you shaped it.\n\nIt speaks: "You\'ve been using me. But you\'ve never truly understood me."',
      choices:[
        {text:'"Then explain yourself."',hint:'Creativity',traits:{creativity:5,compassion:2},xp:38,hp:0},
        {text:'Sit with it. Listen without agenda.',hint:'Compassion',traits:{compassion:6,discipline:2},xp:40,hp:0},
        {text:'"I understand what matters. That\'s enough."',hint:'Ambition',traits:{ambition:4,power:2},xp:32,hp:-10},
        {text:'Merge your current self with the Origin consciously.',hint:'Leadership',traits:{leadership:5,creativity:3},xp:44,hp:-5}
      ]
    },
    {
      type:'boss', floor:100,
      title:'Floor 100 — The Gauntlet Master',
      text:'The Gauntlet Master has no face.\n\nThey are every challenge you faced compressed into one. Every moral weight. Every combat. Every moment you chose without certainty.\n\n"One question," they say. "Why did you come here?"',
      choices:[
        {text:'"To know what I\'m made of."',hint:'Discipline',traits:{discipline:6,power:2},xp:60,hp:-10},
        {text:'"To become someone the city can count on."',hint:'Leadership',traits:{leadership:6,compassion:3},xp:65,hp:-5},
        {text:'"To prove something to myself."',hint:'Ambition',traits:{ambition:5,creativity:2},xp:58,hp:-8},
        {text:'"I\'m not sure yet. But I\'m still here."',hint:'Compassion',traits:{compassion:4,discipline:4,creativity:2},xp:70,hp:0}
      ]
    }
  ];

  /* ═══════════════════════════════════════════════════════════════════════
     STATE
     ════════════════════════════════════════════════════════════════════ */
  var state = {
    floor: 0,
    hp: 100,
    willpower: 100,
    xpGained: 0,
    choicesMade: 0,
    active: false
  };

  /* ═══════════════════════════════════════════════════════════════════════
     UI HELPERS
     ════════════════════════════════════════════════════════════════════ */
  var app = document.getElementById('app');
  var toastArea = document.getElementById('toast-area');

  function toast(text, type) {
    var el = document.createElement('div');
    el.className = 'toast' + (type ? ' ' + type : '');
    el.textContent = text;
    toastArea.appendChild(el);
    setTimeout(function() { el.remove(); }, 2600);
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ═══════════════════════════════════════════════════════════════════════
     CHALLENGE SELECTION
     ════════════════════════════════════════════════════════════════════ */
  var usedChallenges = [];

  function getChallenge(floor) {
    // Check for boss
    var boss = BOSS_CHALLENGES.find(function(b){ return b.floor === floor; });
    if (boss) return boss;

    // Weighted selection: avoid recent repeats
    var pool = CHALLENGES.filter(function(c, i) {
      return !usedChallenges.slice(-4).includes(i);
    });
    if (!pool.length) pool = CHALLENGES;

    // Weight toward harder types on higher floors
    var available = floor > 50 ? pool.filter(function(c){ return c.type !== 'social'; }) : pool;
    if (!available.length) available = pool;

    var idx = Math.floor(Math.random() * available.length);
    var challenge = available[idx];
    usedChallenges.push(CHALLENGES.indexOf(challenge));
    return challenge;
  }

  /* ═══════════════════════════════════════════════════════════════════════
     RENDER FUNCTIONS
     ════════════════════════════════════════════════════════════════════ */
  function renderVitals() {
    var hpPct  = Math.max(0, Math.round(state.hp));
    var wPct   = Math.max(0, Math.round(state.willpower));
    return '<div class="vitals">' +
      '<div class="vital-card">' +
        '<div class="vital-label">HP</div>' +
        '<div class="vital-bar"><span class="hp-fill" style="width:' + hpPct + '%"></span></div>' +
        '<div class="vital-val">' + hpPct + ' / 100</div>' +
      '</div>' +
      '<div class="vital-card">' +
        '<div class="vital-label">Willpower</div>' +
        '<div class="vital-bar"><span class="will-fill" style="width:' + wPct + '%"></span></div>' +
        '<div class="vital-val">' + wPct + ' / 100</div>' +
      '</div>' +
    '</div>';
  }

  function renderProgress() {
    var pct = Math.round((state.floor / 100) * 100);
    return '<div class="progress-wrap">' +
      '<div class="progress-meta"><span>Progress</span><span>' + state.floor + ' / 100 floors</span></div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '</div>';
  }

  var trailClass = {'leadership':'t-l','creativity':'t-c','discipline':'t-d','compassion':'t-co','ambition':'t-a','power':'t-p'};

  function renderTraitSummary(rec) {
    if (!rec) return '';
    var rows = SparkEngine.TRAIT_KEYS.map(function(k) {
      var v = rec.traits[k] || 0;
      var tc = trailClass[k] || '';
      return '<div class="trait-row">' +
        '<span class="trait-name">' + k + '</span>' +
        '<div class="trait-bar-wrap"><div class="trait-bar-fill ' + tc + '" style="width:' + v + '%"></div></div>' +
        '<span class="trait-score">' + v + '</span>' +
      '</div>';
    }).join('');
    return '<div class="trait-summary">' + rows + '</div>';
  }

  /* ═══════════════════════════════════════════════════════════════════════
     FLOOR RENDER
     ════════════════════════════════════════════════════════════════════ */
  function renderFloor(challenge) {
    var isBoss = challenge.type === 'boss';
    var bossHtml = isBoss ? '<div class="boss-banner"><strong>⚡ BOSS FLOOR</strong><span>This encounter will test your core manifestation.</span></div>' : '';

    var choicesHtml = challenge.choices.map(function(c, i) {
      return '<button class="g-choice" data-choice="' + i + '">' +
        '<span class="g-choice-num">' + (i+1) + '</span>' +
        '<span class="g-choice-text">' + esc(c.text) +
          '<span class="g-choice-hint">' + esc(c.hint) + ' path</span>' +
        '</span>' +
      '</button>';
    }).join('');

    app.innerHTML =
      '<div class="floor-header">' +
        '<div class="floor-kicker">The Gauntlet</div>' +
        '<div class="floor-number">' + state.floor + '</div>' +
        '<div class="floor-label">' + esc(challenge.title) + '</div>' +
      '</div>' +
      renderProgress() +
      renderVitals() +
      bossHtml +
      '<div class="challenge-card">' +
        '<div class="challenge-type type-' + challenge.type + '">' + challenge.type.toUpperCase() + '</div>' +
        '<div class="challenge-title">' + esc(challenge.title) + '</div>' +
        '<div class="challenge-text">' + esc(challenge.text) + '</div>' +
        '<div class="choice-grid">' + choicesHtml + '</div>' +
      '</div>';

    // Bind choices
    app.querySelectorAll('.g-choice').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var idx = parseInt(btn.getAttribute('data-choice'), 10);
        handleChoice(challenge.choices[idx]);
      });
    });
  }

  /* ═══════════════════════════════════════════════════════════════════════
     CHOICE HANDLING
     ════════════════════════════════════════════════════════════════════ */
  function handleChoice(choice) {
    // Disable buttons
    app.querySelectorAll('.g-choice').forEach(function(b){ b.disabled = true; });

    // Apply HP change
    state.hp = Math.max(0, state.hp + (choice.hp || 0));
    state.willpower = Math.max(0, Math.min(100, state.willpower + Math.floor(Math.random() * 6) - 1));
    state.xpGained += (choice.xp || 0);
    state.choicesMade += 1;

    // Apply to engine (Tier 2 — Gauntlet)
    if (choice.traits) SparkEngine.updateTraits(choice.traits);
    if (choice.xp)     SparkEngine.addXP(choice.xp, 'gauntlet', 2);
    SparkEngine.updateGauntlet({ current_floor: state.floor });

    var rec = SparkEngine.load();

    // Toasts
    if (choice.traits) {
      Object.keys(choice.traits).forEach(function(k) {
        var delta = choice.traits[k];
        if (delta === 0) return;
        toast((delta > 0 ? '+' : '') + delta + ' ' + k, delta < 0 ? 'neg' : '');
      });
    }
    if (choice.xp) toast('+' + choice.xp + ' XP', 'gold');
    if (choice.hp < 0) toast(choice.hp + ' HP', 'neg');

    // Outcome text
    var outcomeText = buildOutcomeText(choice, state.floor);

    // Show outcome, then proceed
    var existingCard = app.querySelector('.challenge-card');
    if (existingCard) {
      var outcomeDiv = document.createElement('div');
      outcomeDiv.className = 'outcome-card';
      outcomeDiv.textContent = outcomeText;
      existingCard.appendChild(outcomeDiv);
    }

    setTimeout(function() {
      if (state.hp <= 0) {
        renderGameOver(false);
        return;
      }
      if (state.floor >= 100) {
        renderGameOver(true);
        return;
      }
      state.floor += 1;
      var nextChallenge = getChallenge(state.floor);
      renderFloor(nextChallenge);
    }, 2000);
  }

  function buildOutcomeText(choice, floor) {
    var outcomes = [
      'You proceed. The Gauntlet notes your choice.',
      'The floor shifts. Something in the air changes.',
      'Your Spark registers the decision.',
      'The Gauntlet accepts your answer and opens the way.',
      'Meridian City will remember this, in its own way.',
      'You carry the weight forward.',
      'The challenge dissolves. You remain.',
      'One more floor behind you. Many ahead.'
    ];
    if (choice.hp < -10) outcomes = [
      'That cost you. But you made it through.',
      'The damage is real. You continue anyway.',
      'You paid for that. The floor above is waiting.'
    ];
    if (floor % 10 === 0) outcomes = [
      'The Gauntlet acknowledges you have made it this far.',
      'Checkpoint. Your record is updated.',
      'The city above is watching. You have not given up.'
    ];
    return outcomes[Math.floor(Math.random() * outcomes.length)];
  }

  /* ═══════════════════════════════════════════════════════════════════════
     GAME OVER
     ════════════════════════════════════════════════════════════════════ */
  function renderGameOver(victory) {
    var rec = SparkEngine.load();
    SparkEngine.updateGauntlet({
      highest_floor: state.floor,
      total_runs: ((rec && rec.gauntlet && rec.gauntlet.total_runs) || 0) + 1,
      active: false
    });
    if (victory) {
      SparkEngine.addWorldEvent('Completed the Gauntlet — all 100 floors', 2);
    } else {
      SparkEngine.addWorldEvent('Reached floor ' + state.floor + ' in the Gauntlet', 2);
    }
    rec = SparkEngine.load();

    var title = victory ? '⚡ Gauntlet Complete' : '💀 Gauntlet Over';
    var msg = victory
      ? 'You cleared all 100 floors. The Gauntlet is complete.\n\nMeridian City has updated your record. Your manifestation traits reflect every choice you made under pressure.'
      : 'You fell at floor ' + state.floor + '. The Gauntlet preserves your progress.\n\nYour traits have shifted. Every floor you climbed is recorded in Meridian City\'s memory.';

    app.innerHTML =
      '<div class="result-panel">' +
        '<h1>' + title + '</h1>' +
        '<p>' + esc(msg) + '</p>' +
        '<div class="stat-grid">' +
          '<div class="stat-card"><strong>' + state.floor + '</strong><span>Floors</span></div>' +
          '<div class="stat-card"><strong>' + state.xpGained + '</strong><span>XP Earned</span></div>' +
          '<div class="stat-card"><strong>' + state.choicesMade + '</strong><span>Choices</span></div>' +
        '</div>' +
        (rec ? renderTraitSummary(rec) : '') +
        '<div class="actions">' +
          '<button class="btn-primary" id="restart-btn">Run Again</button>' +
          '<a class="btn-secondary" href="/adventure/">Campaign Mode</a>' +
          '<a class="btn-secondary" href="/spark-dashboard/">Command Post</a>' +
        '</div>' +
      '</div>';

    var restartBtn = document.getElementById('restart-btn');
    if (restartBtn) {
      restartBtn.addEventListener('click', function() {
        init();
      });
    }
  }

  /* ═══════════════════════════════════════════════════════════════════════
     INIT
     ════════════════════════════════════════════════════════════════════ */
  function init() {
    var rec = SparkEngine.load();
    if (!rec) {
      app.innerHTML =
        '<div class="result-panel">' +
        '<div style="font-size:3rem;margin-bottom:12px">⚡</div>' +
        '<h1>No Spark</h1>' +
        '<p>Create your character first to enter the Gauntlet.</p>' +
        '<div class="actions"><a class="btn-primary" href="/quiz/">Create Your Spark →</a></div>' +
        '</div>';
      return;
    }

    // Reset run state (not character state)
    state.floor = 1;
    state.hp = 100;
    state.willpower = 100;
    state.xpGained = 0;
    state.choicesMade = 0;
    state.active = true;
    usedChallenges = [];

    SparkEngine.updateGauntlet({ active: true, current_floor: 1 });

    var challenge = getChallenge(1);
    renderFloor(challenge);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

}());
</script>
</body>
</html>
