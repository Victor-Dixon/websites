<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="refresh" content="0; url=/blog.html">
  <link rel="canonical" href="/blog.html">
  <title>Blog | FreeRideInvestor</title>
  <style>
    :root {
      --bg: #080b12;
      --text: #f8fafc;
      --muted: #b6c2d1;
      --line: rgba(255,255,255,.13);
      --accent: #70e1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #172554 0, var(--bg) 44%);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: var(--accent); }
    .site-nav {
      border-bottom: 1px solid var(--line);
      background: rgba(8,11,18,.86);
    }
    .nav-inner, main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }
    .nav-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand { color: var(--text); font-weight: 950; text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .nav-links a {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }
    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      border-color: var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
    }
    main { padding: 64px 0; }
    p { color: var(--muted); }
    @media (max-width: 860px) {
      .nav-inner { align-items: flex-start; flex-direction: column; padding: 14px 0; }
      .nav-links { justify-content: flex-start; }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: {
            freeride: {
              bg: "#020617",
              panel: "#0f172a",
              cyan: "#70e1ff",
              violet: "#a78bfa",
              emerald: "#86efac",
            },
          },
          boxShadow: {
            glow: "0 0 80px rgba(112,225,255,.18)",
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/assets/css/freeride-theme.css">
</head>
<body class="freeride-theme bg-slate-950 text-slate-100 antialiased selection:bg-cyan-300/25 selection:text-cyan-50">
  <nav class="site-nav backdrop-blur-xl supports-[backdrop-filter]:bg-slate-950/70" aria-label="Primary navigation">
    <div class="nav-inner">
      <a class="brand" href="/">FreeRideInvestor</a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/blog.html" aria-current="page">Blog</a>
        <a href="/trading-journal.html">Journal</a>
        <a href="/replay-proof.html">Replay Proof</a>
        <a href="/day-trade-planner.html">Day Planner</a>
        <a href="/early-access.html">Early Access</a>
      </div>
    </div>
  </nav>
  <main>
    <h1>Blog</h1>
    <p>Opening the <a href="/blog.html">FreeRideInvestor blog</a>.</p>
  </main>
  <script type="module" src="/assets/js/freeride-market-field.js"></script>
</body>
</html>
