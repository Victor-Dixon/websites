<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Spark Cards | dadudekc.site</title>
<meta name="description" content="View saved Spark superhero trading cards, team card effects, rarity tiers, and hero profiles.">
<style>
:root{--bg:#020612;--panel:#081323;--panel2:#0c1e36;--text:#f7fbff;--muted:rgba(247,251,255,.68);--line:rgba(135,212,255,.22);--accent:#35c8ff;--accent2:#7dffbe}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
body{background:radial-gradient(circle at 10% 0%,rgba(53,200,255,.22),transparent 28rem),radial-gradient(circle at 95% 10%,rgba(125,255,190,.16),transparent 24rem),linear-gradient(180deg,#020612,#030815 52%,#01030a)}
a{color:inherit}
.wrap{width:min(100% - 1rem,1180px);margin:0 auto;padding:1rem 0 4rem}
.topbar{display:flex;justify-content:space-between;gap:1rem;align-items:center;padding:.85rem 0 1rem}
.brand{display:flex;align-items:center;gap:.7rem;font-weight:1000;letter-spacing:.12em;text-transform:uppercase}
.brand:before{content:"";width:2.2rem;height:2.2rem;border-radius:50%;background:radial-gradient(circle,#fff,var(--accent) 44%,#06213b 70%);box-shadow:0 0 20px rgba(53,200,255,.55)}
nav{display:flex;gap:.65rem;flex-wrap:wrap}
nav a{color:var(--muted);text-decoration:none;font-weight:850;border:1px solid transparent;padding:.45rem .65rem;border-radius:999px}
nav a[aria-current="page"],nav a:hover{color:var(--text);border-color:var(--line);background:rgba(255,255,255,.06)}
.screen{border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,rgba(8,25,54,.9),rgba(2,6,18,.96));box-shadow:0 34px 90px rgba(0,0,0,.5),inset 0 0 60px rgba(53,200,255,.06);overflow:hidden}
.screen-head{display:flex;justify-content:space-between;gap:1rem;align-items:center;padding:1rem 1.1rem;border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(53,200,255,.18),rgba(255,255,255,.03))}
.screen-head h1{margin:0;font-size:clamp(1.55rem,4vw,2.55rem);letter-spacing:.08em;text-transform:uppercase}
.kicker{color:var(--accent);text-transform:uppercase;letter-spacing:.15em;font-size:.76rem;font-weight:1000}
.tabs{display:flex;gap:.5rem;flex-wrap:wrap}.tab{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:8px;padding:.55rem .75rem;font-weight:950;color:var(--muted)}.tab.active{background:linear-gradient(90deg,#0b70ff,#35c8ff);color:#fff}
.layout{display:grid;grid-template-columns:330px minmax(0,1fr);gap:1rem;padding:1rem}
.left-rail{display:grid;gap:.75rem;align-content:start}
.rail-card,.panel{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045);padding:1rem}
.rail-card h2,.panel h2{margin:.2rem 0 .75rem}
.effect-menu{display:grid;gap:.5rem}
.effect-menu button{width:100%;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.06);color:var(--text);padding:.72rem;text-align:left;font-weight:950}
.equipped{display:grid;grid-template-columns:minmax(280px,410px) minmax(0,1fr);gap:1rem;align-items:start}
.preview{display:grid;justify-items:center}
.details{display:grid;gap:1rem}
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.75rem}
.stat-grid div{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.055);padding:.85rem}.stat-grid strong,.stat-grid span{display:block}.stat-grid span{color:var(--accent);font-weight:1000}
.effects{list-style:none;margin:0;padding:0;display:grid;gap:.65rem}.effects li{border:1px solid rgba(135,212,255,.18);border-radius:14px;background:rgba(255,255,255,.05);padding:.85rem}.effects strong,.effects span{display:block}.effects span{color:var(--accent2);font-weight:1000}
.collection{padding:1rem;border-top:1px solid var(--line);background:rgba(0,0,0,.2)}
.owned-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:.8rem;margin-top:.75rem}
.mini-card{border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,rgba(53,200,255,.11),rgba(255,255,255,.035));padding:.45rem;color:var(--text);cursor:pointer;text-align:left;box-shadow:0 10px 24px rgba(0,0,0,.28)}
.mini-card[data-selected="1"]{outline:3px solid rgba(53,200,255,.72);background:linear-gradient(180deg,rgba(53,200,255,.22),rgba(125,255,190,.08))}
.mini-card img{width:100%;aspect-ratio:5/7;object-fit:cover;border-radius:9px;border:1px solid rgba(255,255,255,.18);display:block;background:#050713}.mini-card b,.mini-card small{display:block}.mini-card b{margin-top:.45rem;line-height:1.05}.mini-card small{color:var(--muted);margin-top:.2rem}
.empty{padding:clamp(1rem,5vw,3rem);text-align:center}.empty h1{font-size:clamp(2rem,7vw,4rem);margin:.3rem 0}.empty p{color:var(--muted)}
.actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:1.25rem}
.btn{min-height:52px;border-radius:999px;padding:.85rem 1.15rem;text-decoration:none;font-weight:1000;display:inline-flex;align-items:center;justify-content:center}.primary{background:var(--accent);color:#03101a}.secondary{border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text)}
p{color:var(--muted);line-height:1.58}
@media(max-width:980px){.layout,.equipped{grid-template-columns:1fr}.left-rail{grid-template-columns:1fr 1fr}.screen-head{display:block}.tabs{margin-top:.8rem}}
@media(max-width:680px){.topbar{display:block}nav{margin-top:.8rem}.layout{padding:.65rem}.left-rail,.stat-grid{grid-template-columns:1fr}.owned-row{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
<script src="/assets/js/spark-hero-cards.js"></script>
</head>
<body data-spark-cards-route="collection-001">
<div class="wrap">
  <header class="topbar">
    <a class="brand" href="/">Spark OS</a>
    <nav aria-label="Primary">
      <a href="/">Home</a>
      <a href="/spark-generator/">Generate</a>
      <a aria-current="page" href="/cards/">Cards</a>
      <a href="/missions/">Missions</a>
      <a href="/battles/">Battles</a>
    </nav>
  </header>
  <main id="card-app"></main>
</div>
<script>
(function(){
  "use strict";
  const app = document.getElementById("card-app");
  const currentKey = "dreamos.currentSparkCharacter.v1";

  function esc(value){
    return SparkHeroCards.escapeHTML(value);
  }

  function currentId(cards){
    let current = null;
    try { current = JSON.parse(localStorage.getItem(currentKey) || "null"); }
    catch(e) { current = null; }
    const params = new URLSearchParams(location.search);
    return params.get("card_id") || (current && current.id) || (cards[0] && cards[0].id) || "";
  }

  function effectList(card){
    return (card.team_effects || []).map(function(effect){
      return '<li><strong>' + esc(effect.label) + '</strong><span>' + esc(effect.value) + '</span><p>' + esc(effect.detail) + '</p></li>';
    }).join("");
  }

  function miniCards(cards, selected){
    return cards.map(function(card){
      return '<button class="mini-card" type="button" data-card-id="' + esc(card.id) + '" ' + (card.id === selected.id ? 'data-selected="1"' : "") + '><img alt="' + esc(card.character_name) + ' card art" src="' + esc(card.artwork_url) + '"><b>' + esc(card.character_name) + '</b><small>' + esc(card.rarity_tier) + ' / ' + esc(card.lead_domain) + '</small></button>';
    }).join("");
  }

  function renderProfile(card){
    app.innerHTML = SparkHeroCards.renderProfile(card, {
      backAction: "back-to-collection",
      missionHref: "/missions/?character_id=" + encodeURIComponent(card.id),
      battleHref: "/battles/"
    });
  }

  function render(){
    const cards = SparkHeroCards.getSavedCards();
    if (!cards.length) {
      app.innerHTML = '<section class="screen empty"><div class="kicker">Comic Cards</div><h1>No Spark cards yet.</h1><p>Generate a Spark first. When the final dossier appears, the premium hero card is created and saved automatically.</p><div class="actions"><a class="btn primary" href="/spark-generator/">Generate Your Spark</a><a class="btn secondary" href="/spark-os/">Open Spark OS</a></div></section>';
      return;
    }

    const id = currentId(cards);
    const selected = cards.find(function(card){ return card.id === id; }) || cards[0];
    localStorage.setItem(currentKey, JSON.stringify(selected));
    app.innerHTML = [
      '<section class="screen">',
      '<div class="screen-head"><div><div class="kicker">Comic Cards</div><h1>Card Collection</h1></div><div class="tabs"><span class="tab active">Equipped Card</span><span class="tab">Owned Card</span><span class="tab">Card Collection</span></div></div>',
      '<div class="layout">',
      '<aside class="left-rail">',
      '<div class="rail-card"><div class="kicker">Equipped Card</div><h2>' + esc(selected.character_name) + '</h2><p>' + esc(selected.team_name || "Spark Team Card") + '</p></div>',
      '<div class="rail-card"><div class="kicker">Card Effects</div><div class="effect-menu">' + (selected.team_effects || []).map(function(effect){ return '<button type="button">' + esc(effect.label) + ' - ' + esc(effect.value) + '</button>'; }).join("") + '</div></div>',
      '</aside>',
      '<div class="equipped">',
      '<div class="preview">' + SparkHeroCards.renderCard(selected, { action: "open-profile" }) + '</div>',
      '<section class="details">',
      '<div class="panel"><div class="kicker">Equipped Card Applies to All Characters</div><h2>' + esc(selected.team_name || "Spark Team Card") + '</h2><p>' + esc(selected.description) + '</p><div class="stat-grid"><div><strong>Power Rating</strong><span>' + esc(selected.power_rating) + '</span></div><div><strong>Combat Rating</strong><span>' + esc(selected.combat_rating) + '</span></div><div><strong>Rarity</strong><span>' + esc(selected.rarity_tier) + '</span></div><div><strong>Domains</strong><span>' + esc(selected.domains.join(", ")) + '</span></div></div></div>',
      '<div class="panel"><div class="kicker">Team Effects</div><ul class="effects">' + effectList(selected) + '</ul></div>',
      '</section>',
      '</div>',
      '</div>',
      '<section class="collection"><div class="kicker">Owned Card Collection</div><div class="owned-row">' + miniCards(cards, selected) + '</div></section>',
      '</section>'
    ].join("");
  }

  document.addEventListener("click", function(ev){
    const cardButton = ev.target.closest("[data-card-id]");
    if (cardButton) {
      const cards = SparkHeroCards.getSavedCards();
      const selected = cards.find(function(card){ return card.id === cardButton.getAttribute("data-card-id"); });
      if (selected) localStorage.setItem(currentKey, JSON.stringify(selected));
      render();
      return;
    }

    const action = ev.target.closest("[data-action]");
    if (!action) return;
    const value = action.getAttribute("data-action");
    if (value === "open-profile") {
      const current = JSON.parse(localStorage.getItem(currentKey) || "null");
      if (current) renderProfile(SparkHeroCards.hydrateCard(current));
      return;
    }
    if (value === "back-to-collection") {
      render();
    }
  });

  SparkHeroCards.loadAccountCharacter().finally(render);
})();
</script>
</body>
</html>
