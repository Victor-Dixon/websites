 make the world cold and heavy and only I move through it.&quot;,&quot;C&quot;:&quot;That I can build something radiant that outlasts the storm.&quot;,&quot;D&quot;:&quot;That I can strike with a precision that ends things cleanly.&quot;,&quot;E&quot;:&quot;That I can see what everyone else misses and act on it first.&quot;,&quot;F&quot;:&quot;That I can turn the lights off and make the world mine.&quot;}},{&quot;q&quot;:53,&quot;question&quot;:&quot;How would an old friend sum you up?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;The one who always built something real when everything fell apart.&quot;,&quot;B&quot;:&quot;The one who struck from far away, clean and final.&quot;,&quot;C&quot;:&quot;The one who saw everything coming because they saw everything.&quot;,&quot;D&quot;:&quot;The one who owned the night and everything in it.&quot;,&quot;E&quot;:&quot;The one who was never where you thought, but always where it counted.&quot;,&quot;F&quot;:&quot;The one who took hold and did not let go until it was over.&quot;}},{&quot;q&quot;:54,&quot;question&quot;:&quot;What&#x27;s your relationship to force?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I redirect it. Every blow becomes my ammunition.&quot;,&quot;B&quot;:&quot;I absorb it. My shields only grow stronger under attack.&quot;,&quot;C&quot;:&quot;I undo it. I mend what was broken and reset the board.&quot;,&quot;D&quot;:&quot;I amplify it. Gravity becomes a weapon in my hands.&quot;,&quot;E&quot;:&quot;I bind it. Metal and magnetism answer my call.&quot;,&quot;F&quot;:&quot;I multiply it. Every copy adds another angle of attack.&quot;}},{&quot;q&quot;:55,&quot;question&quot;:&quot;How do you protect your allies?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I raise a barrier between them and harm.&quot;,&quot;B&quot;:&quot;I take the hit and heal the damage before it slows them.&quot;,&quot;C&quot;:&quot;I make the ground beneath the enemy too heavy to move.&quot;,&quot;D&quot;:&quot;I wrap them in fields that turn blades and bullets aside.&quot;,&quot;E&quot;:&quot;I pull rebar from the walls and weave a cage around them.&quot;,&quot;F&quot;:&quot;I surround them with copies of myself \u2014 living shields that hit back.&quot;}},{&quot;q&quot;:56,&quot;question&quot;:&quot;What do you do when the enemy has you outnumbered?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I even the odds \u2014 one of me for every one of them.&quot;,&quot;B&quot;:&quot;I lock them in place \u2014 gravity is the great equalizer.&quot;,&quot;C&quot;:&quot;I turn their numbers against them \u2014 every hit feeds my next strike.&quot;,&quot;D&quot;:&quot;I shield myself and outlast the storm.&quot;,&quot;E&quot;:&quot;I scatter metal debris into a whirling barrier.&quot;,&quot;F&quot;:&quot;I heal faster than they can hurt me.&quot;}},{&quot;q&quot;:57,&quot;question&quot;:&quot;How do you shape the world around you?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I move things without touching them \u2014 pure will, made visible.&quot;,&quot;B&quot;:&quot;I bend gravity until up and down are suggestions.&quot;,&quot;C&quot;:&quot;I summon fields of force that reshape the terrain.&quot;,&quot;D&quot;:&quot;I pull the iron from the earth and build my own fortress.&quot;,&quot;E&quot;:&quot;I duplicate until I am the terrain.&quot;,&quot;F&quot;:&quot;I redirect every force they throw until the world itself turns on them.&quot;}},{&quot;q&quot;:58,&quot;question&quot;:&quot;What&#x27;s your most natural response to danger?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I raise a shield \u2014 fast, absolute, and unyielding.&quot;,&quot;B&quot;:&quot;I split \u2014 one body draws the hit, another delivers the counter.&quot;,&quot;C&quot;:&quot;I heal through it. Pain is temporary; I am not.&quot;,&quot;D&quot;:&quot;I crush them under their own weight.&quot;,&quot;E&quot;:&quot;I turn their momentum into a weapon and throw it back.&quot;,&quot;F&quot;:&quot;I wrap myself in a shell of scrap metal and wait for the opening.&quot;}},{&quot;q&quot;:59,&quot;question&quot;:&quot;What&#x27;s your instinct in a fight?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I become the predator \u2014 fast, fierce, and final.&quot;,&quot;B&quot;:&quot;I let the environment do the work \u2014 roots, vines, and shifting earth.&quot;,&quot;C&quot;:&quot;I change my body until I&#x27;m armored, venomous, or untouchable.&quot;,&quot;D&quot;:&quot;I call down wind and rain and let nature finish it.&quot;,&quot;E&quot;:&quot;I release a fog of instinct \u2014 fear, lust, rage \u2014 and watch them unravel.&quot;,&quot;F&quot;:&quot;I become something they&#x27;ve never seen and don&#x27;t know how to fight.&quot;}},{&quot;q&quot;:60,&quot;question&quot;:&quot;How do you heal?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I don&#x27;t \u2014 I adapt so I never need to.&quot;,&quot;B&quot;:&quot;I let the wild take the damage and grow back stronger.&quot;,&quot;C&quot;:&quot;I shift my flesh until the wound is gone.&quot;,&quot;D&quot;:&quot;I accelerate my own biology until I close the gap.&quot;,&quot;E&quot;:&quot;I change form entirely, leaving the damage behind.&quot;,&quot;F&quot;:&quot;I draw vitality from the living things around me.&quot;}},{&quot;q&quot;:61,&quot;question&quot;:&quot;What&#x27;s your relationship to change?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I am constant \u2014 the world changes around me.&quot;,&quot;B&quot;:&quot;I flow with it \u2014 seasons, cycles, and adaptation.&quot;,&quot;C&quot;:&quot;I force it \u2014 my body becomes whatever survival demands.&quot;,&quot;D&quot;:&quot;I wear it \u2014 a new face for every need.&quot;,&quot;E&quot;:&quot;I trigger it in others \u2014 a chemical push that makes them someone else.&quot;,&quot;F&quot;:&quot;I summon it \u2014 the weather turns because I will it.&quot;}},{&quot;q&quot;:62,&quot;question&quot;:&quot;How do you mark your territory?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I reshape the land itself \u2014 roots, stone, and growth.&quot;,&quot;B&quot;:&quot;I leave a scent that warns others away.&quot;,&quot;C&quot;:&quot;I become the apex presence \u2014 no one challenges the top predator.&quot;,&quot;D&quot;:&quot;I make the air itself heavy with my will \u2014 storms, heat, and pressure.&quot;,&quot;E&quot;:&quot;I adapt until the territory is an extension of my body.&quot;,&quot;F&quot;:&quot;I shift between forms so no one knows what rules here.&quot;}},{&quot;q&quot;:63,&quot;question&quot;:&quot;What do you trust most about your own nature?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;That I can become anything I need to be.&quot;,&quot;B&quot;:&quot;That the wild answers my call.&quot;,&quot;C&quot;:&quot;That my body will find a way to survive.&quot;,&quot;D&quot;:&quot;That my presence changes the mood of every room.&quot;,&quot;E&quot;:&quot;That I can wear a thousand faces and none of them are truly me.&quot;,&quot;F&quot;:&quot;That the sky itself moves when I demand it.&quot;}},{&quot;q&quot;:64,&quot;question&quot;:&quot;What&#x27;s your relationship to truth?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I know it \u2014 I hear what they really think beneath the lie.&quot;,&quot;B&quot;:&quot;I control it \u2014 I make them see what I need them to see.&quot;,&quot;C&quot;:&quot;I destroy it \u2014 I hit their mind so hard that reality frays.&quot;,&quot;D&quot;:&quot;I protect it \u2014 I keep my own thoughts clear and sealed.&quot;,&quot;E&quot;:&quot;I bend it \u2014 I move the world without touching it, and who&#x27;s to say what&#x27;s real?&quot;,&quot;F&quot;:&quot;I uncover it \u2014 I feel their intent before they know it themselves.&quot;}},{&quot;q&quot;:65,&quot;question&quot;:&quot;How do you handle a crowd?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I read the mood of the whole room at once.&quot;,&quot;B&quot;:&quot;I plant a single thought and watch it spread.&quot;,&quot;C&quot;:&quot;I shield myself from the noise \u2014 a wall of silence in a sea of sound.&quot;,&quot;D&quot;:&quot;I push them \u2014 one command, and they move like puppets.&quot;,&quot;E&quot;:&quot;I scatter their senses \u2014 illusions, whispers, and doubt.&quot;,&quot;F&quot;:&quot;I don&#x27;t. Crowds are overwhelming; I stay at the edges.&quot;}},{&quot;q&quot;:66,&quot;question&quot;:&quot;What&#x27;s your preferred battlefield?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;The mind \u2014 I fight where they can&#x27;t see me.&quot;,&quot;B&quot;:&quot;The senses \u2014 I make them doubt everything they perceive.&quot;,&quot;C&quot;:&quot;The will \u2014 I break their desire to resist.&quot;,&quot;D&quot;:&quot;The physical world \u2014 I move objects, not people.&quot;,&quot;E&quot;:&quot;The hidden space \u2014 I read their plans before they make them.&quot;,&quot;F&quot;:&quot;The defended self \u2014 I let them tire themselves against my walls.&quot;}},{&quot;q&quot;:67,&quot;question&quot;:&quot;How do you win a fight without throwing a punch?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;I make them want to stop.&quot;,&quot;B&quot;:&quot;I show them a reality where they&#x27;ve already lost.&quot;,&quot;C&quot;:&quot;I hit their mind so hard they can&#x27;t stand.&quot;,&quot;D&quot;:&quot;I read their next move and counter before they think it.&quot;,&quot;E&quot;:&quot;I turn their own weapons against them from across the room.&quot;,&quot;F&quot;:&quot;I wait \u2014 they exhaust themselves against my defenses.&quot;}},{&quot;q&quot;:68,&quot;question&quot;:&quot;What do you fear most?&quot;,&quot;options&quot;:{&quot;A&quot;:&quot;Having my own mind read.&quot;,&quot;B&quot;:&quot;Losing control of my own thoughts.&quot;,&quot;C&quot;:&quot;Being unable to tell what&#x27;s real.&quot;,&quot;D&quot;:&quot;Being cut off \u2014 alone in a silent head.&quot;,&quot;E&quot;:&quot;Being overwhelmed by too many voices.&quot;,&quot;F&quot;:&quot;Being powerless \u2014 unable to move, unable to act.&quot;}}]}</script>

  <script>
  (function () {
    "use strict";

    const app = document.getElementById("spark-app");
    const endpoint = "/wp-json/emergence/v1/generate";
    const bank = JSON.parse(document.getElementById("spark-question-bank").textContent);
    const domainQuestions = (bank.domain_questions || []).slice(0, 28);
    const flavorQuestionsRaw = bank.flavor_questions || [];
    const letters = ["A","B","C","D","E","F","G","H"];
    const storeKey = "dreamos.sparkOS.clean.v1";

    function load() {
      try { return JSON.parse(sessionStorage.getItem(storeKey) || "{}") || {}; }
      catch (e) { return {}; }
    }

    function save(state) {
      sessionStorage.setItem(storeKey, JSON.stringify(state || {}));
    }

    function esc(s) {
      return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }

    function options(q) {
      const raw = q.options || q.answers || q.choices || {};
      const out = [];
      if (Array.isArray(raw)) {
        raw.forEach((v,i) => out.push([letters[i] || String(i+1), typeof v === "object" ? (v.text || v.label || v.answer || v.value || "") : String(v)]));
      } else {
        letters.forEach(l => {
          if (raw[l] || raw[l.toLowerCase()]) out.push([l, raw[l] || raw[l.toLowerCase()]]);
        });
      }
      return out.length ? out.slice(0, 8) : letters.map(l => [l, "Option " + l]);
    }

    function answerCount(answers, questions) {
      return questions.reduce((n,q) => n + (answers && answers[String(q.q)] ? 1 : 0), 0);
    }

    function progress(label, count, total) {
      const pct = total ? Math.round((count / total) * 100) : 0;
      return `<div class="progress"><strong>${esc(label)}: ${count}/${total}</strong><div class="bar"><span style="width:${pct}%"></span></div></div>`;
    }

    function questionCard(q, answers) {
      const selected = answers[String(q.q)] || "";
      return `
        <article class="question" data-q="${q.q}">
          <h3>Q${q.q}</h3>
          <p>${esc(q.question || q.prompt || q.text || "Question " + q.q)}</p>
          <div class="options">
            ${options(q).map(([letter,text]) => `
              <button class="option" type="button" data-answer="${letter}" data-question="${q.q}" ${selected === letter ? 'data-selected="1"' : ""}>
                <strong>${letter}</strong>
                <span>${esc(text)}</span>
              </button>
            `).join("")}
          </div>
        </article>
      `;
    }

    function flavorQuestionsFor(result) {
      const manifested = new Set((result.manifested || []).map(v => String(v).toLowerCase()));
      const normalized = flavorQuestionsRaw.map((q, idx) => Object.assign({}, q, { q: q.q || q.id || q.number || (idx + 29) }));
      const filtered = normalized.filter(q => !q.domain || manifested.has(String(q.domain).toLowerCase()));
      return filtered.length ? filtered : normalized;
    }

    function renderDomain() {
      const state = load();
      state.phase = "domain";
      state.domain_answers = state.domain_answers || {};
      save(state);

      const count = answerCount(state.domain_answers, domainQuestions);
      app.innerHTML = `
        <section class="panel" data-phase="domain">
          <div class="kicker">Pass 1</div>
          <h2>Domain Typing</h2>
          <p>Answer all 28. Buttons are plain first-party HTML. No external UI state.</p>
          ${progress("Domain pass", count, domainQuestions.length)}
          <div class="question-list">
            ${domainQuestions.map(q => questionCard(q, state.domain_answers)).join("")}
          </div>
          <div class="actions">
            <button class="primary" type="button" data-action="submit-domain" ${count < domainQuestions.length ? "disabled" : ""}>Generate Spark Pass 1</button>
            <button class="secondary" type="button" data-action="reset">Reset</button>
          </div>
        </section>
      `;
    }

    function renderFlavor() {
      const state = load();
      const result = state.domain_result || {};
      state.flavor_answers = state.flavor_answers || {};
      const questions = flavorQuestionsFor(result);
      const count = answerCount(state.flavor_answers, questions);

      app.innerHTML = `
        <section class="panel" data-phase="flavor">
          <div class="kicker">Pass 2</div>
          <h2>${esc(result.lead_domain || "Spark")} Flavor Pass</h2>
          <p><strong>Manifested:</strong> ${esc((result.manifested || []).join(", ") || "Pending")}</p>
          ${progress("Flavor pass", count, questions.length)}
          <div class="question-list">
            ${questions.map(q => questionCard(q, state.flavor_answers)).join("")}
          </div>
          <div class="actions">
            <button class="primary" type="button" data-action="submit-flavor" ${questions.length && count < questions.length ? "disabled" : ""}>Build Final Dossier</button>
            <button class="secondary" type="button" data-action="reset">Reset</button>
          </div>
        </section>
      `;
    }

    function renderFinal() {
      const state = load();
      const r = state.final_result || state.domain_result || {};
      const manifested = Array.isArray(r.manifested) ? r.manifested.join(", ") : "Pending";
      const powers = Array.isArray(r.powers) ? r.powers.map(p => typeof p === "object" ? (p.name || p.title || p.power || "") : String(p)).filter(Boolean).join(", ") : "";

      app.innerHTML = `
        <section class="panel" data-phase="final">
          <div class="kicker">Final Dossier</div>
          <h2>${esc(r.lead_domain || "Generated")} Spark</h2>
          <div class="result-grid">
            <div><strong>Cast</strong><span>${esc(r.cast || "Pending")}</span></div>
            <div><strong>Signature</strong><span>${esc(r.spark_signature || r.provisional_spark_signature || "Pending")}</span></div>
            <div><strong>Combat</strong><span>${esc(r.combat_capability || r.provisional_combat_capability || "Pending")}</span></div>
            <div><strong>Domains</strong><span>${esc(manifested)}</span></div>
          </div>
          ${powers ? `<p><strong>Powers:</strong> ${esc(powers)}</p>` : ""}
          <p>${esc(r.profile_shape || "Spark profile generated.")}</p>
          <div class="actions">
            <a class="btn primary" href="/missions/">Open Missions</a>
            <a class="btn secondary" href="/battles/">Enter the What-If Arena</a>
            <button class="secondary" type="button" data-action="reset">Start Over</button>
          </div>
          <details><summary>Raw protocol output</summary><pre>${esc(JSON.stringify(r, null, 2))}</pre></details>
        </section>
      `;
    }

    function showError(message) {
      const box = document.createElement("div");
      box.className = "error";
      box.textContent = String(message || "Unknown error");
      app.prepend(box);
    }

    async function post(body) {
      const res = await fetch(endpoint, {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const payload = await res.json();
      if (!res.ok) throw new Error(payload.message || "HTTP " + res.status);
      return payload;
    }

    app.addEventListener("click", async function (ev) {
      const btn = ev.target.closest("button,a");
      if (!btn) return;

      const answer = ev.target.closest("[data-answer]");
      if (answer) {
        ev.preventDefault();
        const state = load();
        const phase = state.phase || "domain";
        const q = answer.getAttribute("data-question");
        const val = answer.getAttribute("data-answer");
        if (phase === "domain") {
          state.domain_answers = state.domain_answers || {};
          state.domain_answers[String(q)] = val;
          save(state);
          renderDomain();
        } else if (phase === "flavor") {
          state.flavor_answers = state.flavor_answers || {};
          state.flavor_answers[String(q)] = val;
          save(state);
          renderFlavor();
        }
        return;
      }

      const action = btn.getAttribute("data-action");
      if (!action) return;

      ev.preventDefault();

      if (action === "start") {
        renderDomain();
        return;
      }

      if (action === "reset") {
        sessionStorage.removeItem(storeKey);
        location.reload();
        return;
      }

      if (action === "submit-domain") {
        if (btn.disabled) return;
        btn.disabled = true;
        btn.textContent = "Generating...";
        try {
          const state = load();
          const payload = await post({
            answers: state.domain_answers || {},
            source: "spark-os-static"
          });
          state.phase = "flavor";
          state.domain_result = payload;
          save(state);
          renderFlavor();
          window.scrollTo({ top:0, behavior:"smooth" });
        } catch (e) {
          btn.disabled = false;
          btn.textContent = "Generate Spark Pass 1";
          showError(e.message || e);
        }
        return;
      }

      if (action === "submit-flavor") {
        if (btn.disabled) return;
        btn.disabled = true;
        btn.textContent = "Building...";
        try {
          const state = load();
          const payload = await post({
            answers: state.domain_answers || {},
            flavor_answers: state.flavor_answers || {},
            source: "spark-os-static"
          });
          state.phase = "final";
          state.final_result = payload;
          save(state);
          renderFinal();
          window.scrollTo({ top:0, behavior:"smooth" });
        } catch (e) {
          btn.disabled = false;
          btn.textContent = "Build Final Dossier";
          showError(e.message || e);
        }
      }
    });
  })();
  </script>
