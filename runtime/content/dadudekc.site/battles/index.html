<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Battle Simulator | dadudekc.site</title>
<style>
:root{--bg:#070915;--panel:#11172b;--text:#f7f7fb;--muted:rgba(247,247,251,.72);--line:rgba(255,255,255,.14);--accent:#7dffbe}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top right,rgba(125,255,190,.13),transparent 34rem),var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
.wrap{width:min(100% - 1rem,920px);margin:0 auto;padding:1rem 0 4rem}
.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border-radius:28px;padding:clamp(1rem,4vw,2rem)}
.card{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:20px;padding:1rem;margin:1rem 0}
a,button{color:inherit}
button,.btn{min-height:52px;border:0;border-radius:999px;padding:.8rem 1.1rem;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.primary{background:var(--accent);color:#071015}
.secondary{background:rgba(255,255,255,.1);border:1px solid var(--line)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.8rem}
.grid div{background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:16px;padding:1rem}
small,p{color:var(--muted)}
pre{white-space:pre-wrap;overflow:auto;background:rgba(0,0,0,.24);padding:1rem;border-radius:16px}
@media(max-width:760px){.grid{grid-template-columns:1fr}.panel{border-radius:22px}}
</style>
</head>
<body data-dreamos-battle-character-reader="1">
<div class="wrap">
  <section class="panel">
    <p><a href="/">Home</a> · <a href="/spark-generator/">Generate Spark</a> · <a href="/missions/">Missions</a></p>
    <h1>What-If Arena</h1>
    <p>Saved Spark characters from the generator appear here.</p>
    <div id="battle-app"></div>
  </section>
</div>
<script>
(function(){
  const app=document.getElementById("battle-app");
  const key="dreamos.savedSparkCharacters.v1";
  const currentKey="dreamos.currentSparkCharacter.v1";
  function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
  function load(){
    let chars=[];
    try{chars=JSON.parse(localStorage.getItem(key)||"[]")||[]}catch(e){chars=[]}
    return chars;
  }
  function selected(chars){
    const params=new URLSearchParams(location.search);
    const id=params.get("character_id");
    if(id) return chars.find(c=>c.id===id)||chars[0];
    try{return JSON.parse(localStorage.getItem(currentKey)||"null")||chars[0]}catch(e){return chars[0]}
  }
  function render(){
    const chars=load();
    if(!chars.length){
      app.innerHTML='<div class="card"><h2>No saved characters yet</h2><p>Generate a Spark first, then return to the arena or mission board.</p><a class="btn primary" href="/spark-generator/">Generate Your Spark</a><a class="btn secondary" href="/missions/">Open Missions</a></div>';
      return;
    }
    const c=selected(chars)||chars[0];
    app.innerHTML=`<div class="card"><h2>${esc(c.lead_domain||"Generated")} Spark</h2><div class="grid"><div><strong>Cast</strong><span>${esc(c.cast||"Pending")}</span></div><div><strong>Signature</strong><span>${esc(c.spark_signature||"Pending")}</span></div><div><strong>Combat</strong><span>${esc(c.combat_capability||"Pending")}</span></div><div><strong>Domains</strong><span>${esc((c.manifested||[]).join(", "))}</span></div></div><p>${esc(c.profile_shape||"")}</p><p><a class="btn primary" href="/missions/?character_id=${encodeURIComponent(c.id)}">Open Missions</a></p><details><summary>Character record</summary><pre>${esc(JSON.stringify(c,null,2))}</pre></details></div><div class="card"><h3>Saved Characters</h3>${chars.map(x=>`<p><a href="/battles/?character_id=${encodeURIComponent(x.id)}">${esc(x.lead_domain||"Spark")} · <small>${esc(x.created_at||"")}</small></a></p>`).join("")}</div>`;
  }
  render();
})();
</script>
</body>
</html>
