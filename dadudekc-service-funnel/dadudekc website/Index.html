<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaDudeKC Home</title>
    <link rel="stylesheet" href="common/css/common.css"> 
    <link rel="stylesheet" href="home/home.css"> 
    <link rel="icon" type="image/png" href="assets/images/favicon.png"/> <!-- Favicon that matches the theme -->
</head>
<body>
    <header>
        <nav class="main-nav">
            <!-- Animated logo that echoes the 'technology and mystery' theme -->
            <div id="logo" class="animated-logo"></div>
            <ul>
                <li><a href="#home" class="nav-link">Home</a></li>
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#services" class="nav-link">Services</a></li>
                <li><a href="#blog" class="nav-link">Blog</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero-section">
            <h1>Welcome to DaDudeKC!</h1>
            <p>Your hub for technology, gaming, and more!</p>
            <button class="btn-learn-more" onclick="location.href='about.html'">Learn More</button>
            <!-- Hero section could include an animated background or interactive elements -->
        </section>

        <section id="about" class="mystery-section">
            <!-- Content with a mysterious vibe, maybe parallax backgrounds with enigmatic symbols -->
        </section>

        <section id="services" class="services-section">
            <!-- Service icons that glow on hover, revealing hidden content or Easter eggs -->
        </section>

        <section id="blog" class="blog-section">
            <!-- Blog previews with neon borders that animate on hover -->
        </section>

        <section id="contact" class="contact-section">
            <!-- A contact form with a futuristic design, perhaps with field labels that appear on focus -->
        </section>
    </main>

    <footer>
        <p>© 2024 DaDudeKC. All rights reserved.</p>
        <!-- Footer could include additional interactive elements like a mini-game or hidden messages -->
    </footer>

    <script src="common/js/utils.js"></script>
    <script src="home/home.js"></script>
    <!-- Additional scripts for animations and interactive elements -->
    <script src="common/js/animations.js"></script>
    <script src="home/interactive-elements.js"></script>
</body>
</html>
