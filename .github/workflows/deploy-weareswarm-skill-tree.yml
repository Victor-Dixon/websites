name: Deploy WeAreSwarm Skill Tree

on:
  push:
    branches:
      - cursor/repair-weareswarm-white-screen-0b91
    paths:
      - .github/workflows/deploy-weareswarm-skill-tree.yml

concurrency:
  group: weareswarm-skill-tree-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload and render Skill Tree
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_HOST: 157.173.214.121
          HOSTINGER_PORT: "65002"
        run: |
          set -euo pipefail
          test -n "$HOSTINGER_SSH_PRIVATE_KEY"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf "%s\n" "$HOSTINGER_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_hostinger"
          chmod 600 "$HOME/.ssh/id_hostinger"
          ssh-keyscan -T 20 -p "$HOSTINGER_PORT" "$HOSTINGER_HOST" >> "$HOME/.ssh/known_hosts" || true

      - name: Upload theme files and render static route
        env:
          HOSTINGER_HOST: 157.173.214.121
          HOSTINGER_USER: u996867598
          HOSTINGER_PORT: "65002"
          REMOTE_ROOT: /home/u996867598/domains/weareswarm.site/public_html
          THEME_DIR: /home/u996867598/domains/weareswarm.site/public_html/wp-content/themes/weareswarm-dreamos
        run: |
          set -euo pipefail
          remote="${HOSTINGER_USER}@${HOSTINGER_HOST}"
          ssh_base=(ssh -i "$HOME/.ssh/id_hostinger" -p "$HOSTINGER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ConnectionAttempts=1 "$remote")
          scp_base=(scp -i "$HOME/.ssh/id_hostinger" -P "$HOSTINGER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ConnectionAttempts=1)

          "${ssh_base[@]}" "set -e
            test -d '$THEME_DIR'
            cp '$THEME_DIR/page-skills.php' '$THEME_DIR/page-skills.php.bak.${GITHUB_RUN_ID}'
            cp '$THEME_DIR/nav.php' '$THEME_DIR/nav.php.bak.${GITHUB_RUN_ID}'
            cp '$THEME_DIR/page-profile.php' '$THEME_DIR/page-profile.php.bak.${GITHUB_RUN_ID}'
            cp '$THEME_DIR/index.php' '$THEME_DIR/index.php.bak.${GITHUB_RUN_ID}'
            if [ -f '$REMOTE_ROOT/skill-tree' ]; then cp '$REMOTE_ROOT/skill-tree' '$REMOTE_ROOT/skill-tree.bak.${GITHUB_RUN_ID}'; fi
          "

          "${scp_base[@]}" \
            "collected/hostinger/wordpress/domains/weareswarm.site/themes/weareswarm-dreamos/page-skills.php" \
            "$remote:$THEME_DIR/page-skills.php"
          "${scp_base[@]}" \
            "collected/hostinger/wordpress/domains/weareswarm.site/themes/weareswarm-dreamos/nav.php" \
            "$remote:$THEME_DIR/nav.php"
          "${scp_base[@]}" \
            "collected/hostinger/wordpress/domains/weareswarm.site/themes/weareswarm-dreamos/page-profile.php" \
            "$remote:$THEME_DIR/page-profile.php"
          "${scp_base[@]}" \
            "collected/hostinger/wordpress/domains/weareswarm.site/themes/weareswarm-dreamos/index.php" \
            "$remote:$THEME_DIR/index.php"

          render_script="/tmp/render-weareswarm-skill-tree-${GITHUB_RUN_ID}.php"
          cat > "$render_script" <<'PHP'
          <?php
          $root = '/home/u996867598/domains/weareswarm.site/public_html';
          chdir($root);
          define('WP_USE_THEMES', false);
          require $root . '/wp-load.php';
          include $root . '/wp-content/themes/weareswarm-dreamos/page-skills.php';
          PHP
          "${scp_base[@]}" "$render_script" "$remote:$render_script"

          "${ssh_base[@]}" "set -e
            php -l '$THEME_DIR/page-skills.php'
            php -l '$THEME_DIR/nav.php'
            php -l '$THEME_DIR/page-profile.php'
            php -l '$THEME_DIR/index.php'
            set +e
            php -d display_errors=1 -d error_reporting=E_ALL '$render_script' > /tmp/weareswarm-skill-tree-rendered-${GITHUB_RUN_ID}.html 2> /tmp/weareswarm-skill-tree-render-${GITHUB_RUN_ID}.err
            render_code=\$?
            set -e
            if [ \$render_code -ne 0 ]; then
              echo 'SKILL_TREE_RENDER_FAILED'
              sed -n '1,120p' /tmp/weareswarm-skill-tree-render-${GITHUB_RUN_ID}.err
              sed -n '1,80p' /tmp/weareswarm-skill-tree-rendered-${GITHUB_RUN_ID}.html
              exit \$render_code
            fi
            mv /tmp/weareswarm-skill-tree-rendered-${GITHUB_RUN_ID}.html '$REMOTE_ROOT/skill-tree'
            rm -f /tmp/weareswarm-skill-tree-render-${GITHUB_RUN_ID}.err
            rm -f '$render_script'
            chmod 644 '$REMOTE_ROOT/skill-tree' '$THEME_DIR/page-skills.php' '$THEME_DIR/nav.php' '$THEME_DIR/page-profile.php' '$THEME_DIR/index.php'
          "

      - name: Verify live Skill Tree
        run: |
          set -euo pipefail
          status="$(curl -L -s -o /tmp/weareswarm-skill-tree.html -w '%{http_code}' --max-time 30 "https://weareswarm.site/skill-tree?cache=${GITHUB_RUN_ID}")"
          echo "HTTP_STATUS=$status"
          if [ "$status" != "200" ]; then
            sed -n '1,80p' /tmp/weareswarm-skill-tree.html
            exit 1
          fi
          grep -q "Neural Progression" /tmp/weareswarm-skill-tree.html
          grep -q "Distributed Swarm Mesh" /tmp/weareswarm-skill-tree.html
          sed -n '1,60p' /tmp/weareswarm-skill-tree.html
