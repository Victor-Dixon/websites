name: Deploy WeAreSwarm Site

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


on:
  workflow_dispatch:
  push:
    branches:
      - master
      - cursor/repair-weareswarm-white-screen-0b91
    paths:
      - .github/workflows/deploy-weareswarm-site.yml
      - routes/weareswarm/**
      - _deploy/weareswarm/**

concurrency:
  group: weareswarm-site-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload hub, services, and www canonical rules
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_HOST: 157.173.214.121
          HOSTINGER_PORT: "65002"
        run: |
          set -euo pipefail
          test -n "$HOSTINGER_SSH_PRIVATE_KEY"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf "%s\n" "$HOSTINGER_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_hostinger"
          chmod 600 "$HOME/.ssh/id_hostinger"
          ssh-keyscan -T 20 -p "$HOSTINGER_PORT" "$HOSTINGER_HOST" >> "$HOME/.ssh/known_hosts" || true


      - name: Remove stale kids planner from weareswarm.site
        continue-on-error: true
        timeout-minutes: 1
        run: |
          ssh -p "${{ secrets.HOSTINGER_PORT }}" \
            -i "$HOME/.ssh/id_hostinger" \
            -o StrictHostKeyChecking=no \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}" \
            "rm -rf /home/u996867598/domains/weareswarm.site/public_html/kids-planner /home/u996867598/domains/weareswarm.site/public_html/data/planner/kids_tasks.json"

      - name: Upload routes and patch canonical host rules
        env:
          HOSTINGER_HOST: 157.173.214.121
          HOSTINGER_USER: u996867598
          HOSTINGER_PORT: "65002"
          REMOTE_ROOT: /home/u996867598/domains/weareswarm.site/public_html
        run: |
          set -euo pipefail
          remote="${HOSTINGER_USER}@${HOSTINGER_HOST}"
          ssh_base=(ssh -i "$HOME/.ssh/id_hostinger" -p "$HOSTINGER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ConnectionAttempts=1 "$remote")
          scp_base=(scp -i "$HOME/.ssh/id_hostinger" -P "$HOSTINGER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ConnectionAttempts=1)

          "${ssh_base[@]}" "set -e
            mkdir -p '$REMOTE_ROOT/dreamos-services' '$REMOTE_ROOT/level10'
            if [ -f '$REMOTE_ROOT/index.html' ]; then cp '$REMOTE_ROOT/index.html' '$REMOTE_ROOT/index.html.bak.${GITHUB_RUN_ID}'; fi
            if [ -f '$REMOTE_ROOT/dreamos-services/index.html' ]; then cp '$REMOTE_ROOT/dreamos-services/index.html' '$REMOTE_ROOT/dreamos-services/index.html.bak.${GITHUB_RUN_ID}'; fi
            if [ -f '$REMOTE_ROOT/level10/index.html' ]; then cp '$REMOTE_ROOT/level10/index.html' '$REMOTE_ROOT/level10/index.html.bak.${GITHUB_RUN_ID}'; fi
            if [ -f '$REMOTE_ROOT/.htaccess' ]; then cp '$REMOTE_ROOT/.htaccess' '$REMOTE_ROOT/.htaccess.bak.${GITHUB_RUN_ID}'; fi
          "

          "${scp_base[@]}" "routes/weareswarm/index.html" "$remote:$REMOTE_ROOT/index.html"
          "${scp_base[@]}" "routes/weareswarm/dreamos-services/index.html" "$remote:$REMOTE_ROOT/dreamos-services/index.html"
          "${scp_base[@]}" "routes/weareswarm/level10/index.html" "$remote:$REMOTE_ROOT/level10/index.html"
          "${scp_base[@]}" "routes/weareswarm/htaccess-canonical-www.snippet" "$remote:/tmp/weareswarm-htaccess-snippet.txt"

          "${ssh_base[@]}" "set -e
            chmod 644 '$REMOTE_ROOT/index.html' '$REMOTE_ROOT/dreamos-services/index.html' '$REMOTE_ROOT/level10/index.html'
            ht='$REMOTE_ROOT/.htaccess'
            touch \"\$ht\"
            # Remove old root -> dreamos-services redirect if present
            sed -i '/dreamos-services/d' \"\$ht\" || true
            if ! grep -q 'WeAreSwarm canonical host' \"\$ht\"; then
              tmp=\"/tmp/weareswarm-htaccess-${GITHUB_RUN_ID}.txt\"
              cat /tmp/weareswarm-htaccess-snippet.txt > \"\$tmp\"
              echo '' >> \"\$tmp\"
              cat \"\$ht\" >> \"\$tmp\"
              mv \"\$tmp\" \"\$ht\"
            fi
            rm -f /tmp/weareswarm-htaccess-snippet.txt
          "

      - name: Verify www Dream.OS landing page and services route
        run: |
          set -euo pipefail

          apex="$(curl -sI --max-time 20 'https://weareswarm.site/' | awk 'toupper($1) ~ /^HTTP/ {code=$2} /^location:/ {loc=$2} END {print code "|" loc}')"
          echo "APEX_ROOT=$apex"
          echo "$apex" | grep -q '^301|https://www.weareswarm.site/'

          www_code="$(curl -sL -o /tmp/weareswarm-hub.html -w '%{http_code}' --max-time 25 'https://www.weareswarm.site/?cache='"${GITHUB_RUN_ID}")"
          echo "WWW_HUB=$www_code"
          [ "$www_code" = "200" ]
          grep -Eq 'sparks the mind|illuminates the world|Dream.OS|Join the Swarm|Proof Wall|7-Day' /tmp/weareswarm-hub.html

          svc_code="$(curl -sL -o /tmp/weareswarm-services.html -w '%{http_code}' --max-time 25 'https://www.weareswarm.site/dreamos-services/?cache='"${GITHUB_RUN_ID}")"
          echo "WWW_SERVICES=$svc_code"
          [ "$svc_code" = "200" ]

          # Services route is a smoke check only; root landing page owns the Dream.OS movement verification.
          test -s /tmp/weareswarm-services.html

          level10_code="$(curl -sL -o /tmp/weareswarm-level10.html -w '%{http_code}' --max-time 25 'https://www.weareswarm.site/level10/?cache='"${GITHUB_RUN_ID}")"
          echo "WWW_LEVEL10=$level10_code"
          [ "$level10_code" = "200" ]
          grep -q 'Level 10 is the ladder out' /tmp/weareswarm-level10.html

