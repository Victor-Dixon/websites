name: Deploy FreeRideInvestor to Hostinger

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - cursor/deploy-freeride-static-5df3
    paths:
      - .github/workflows/deploy-freeride-hostinger.yml
      - runtime/config/website_deploy_modes.yaml
      - runtime/content/freerideinvestor.com/**
      - runtime/scripts/hostinger_deploy_target_guard.py
      - runtime/scripts/hostinger_static_deploy_guarded.py
      - runtime/scripts/validate_website_deploy_modes.py

jobs:
  deploy:
    name: Deploy FreeRideInvestor static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deploy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client

      - name: Configure SSH key
        env:
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          set -euo pipefail
          : "${HOSTINGER_SSH_PRIVATE_KEY:?missing HOSTINGER_SSH_PRIVATE_KEY}"
          : "${HOSTINGER_HOST:?missing HOSTINGER_HOST}"
          : "${HOSTINGER_PORT:?missing HOSTINGER_PORT}"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf "%s\n" "$HOSTINGER_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_hostinger"
          chmod 600 "$HOME/.ssh/id_hostinger"
          ssh-keyscan -T 15 -p "$HOSTINGER_PORT" "$HOSTINGER_HOST" >> "$HOME/.ssh/known_hosts" || true
          cat > "$HOME/.ssh/config" << SSHCFG
          Host *
            IdentityFile ~/.ssh/id_hostinger
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          SSHCFG

      - name: Write Hostinger deploy env
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          set -euo pipefail
          : "${HOSTINGER_HOST:?missing HOSTINGER_HOST}"
          : "${HOSTINGER_USER:?missing HOSTINGER_USER}"
          : "${HOSTINGER_PORT:?missing HOSTINGER_PORT}"
          mkdir -p "$HOME/.config/dreamos"
          cat > "$HOME/.config/dreamos/hostinger_freeride_github_secrets.env" <<EOF
          HOSTINGER_HOST=$HOSTINGER_HOST
          HOSTINGER_USER=$HOSTINGER_USER
          HOSTINGER_PORT=$HOSTINGER_PORT
          HOSTINGER_SSH_PRIVATE_KEY_FILE=$HOME/.ssh/id_hostinger
          EOF
          chmod 600 "$HOME/.config/dreamos/hostinger_freeride_github_secrets.env"

      - name: Validate static HTML
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          root = Path("runtime/content/freerideinvestor.com")
          files = sorted(root.glob("*.html"))
          if not files:
              raise SystemExit("HTML_FILE_COUNT=0")

          for path in files:
              Parser().feed(path.read_text(encoding="utf-8"))
              print(f"HTML_PARSE=PASS {path}")
          print(f"HTML_FILE_COUNT={len(files)}")
          PY

      - name: Deploy static site to Hostinger
        run: |
          set -euo pipefail
          python3 runtime/scripts/hostinger_static_deploy_guarded.py \
            --env "$HOME/.config/dreamos/hostinger_freeride_github_secrets.env" \
            --domain freerideinvestor.com \
            --local-root runtime/content/freerideinvestor.com \
            --file runtime/content/freerideinvestor.com/day-trade-planner.html \
            --file runtime/content/freerideinvestor.com/early-access.html \
            --file runtime/content/freerideinvestor.com/index.html \
            --file runtime/content/freerideinvestor.com/replay-proof.html \
            --file runtime/content/freerideinvestor.com/trading-journal/index.html \
            --file runtime/content/freerideinvestor.com/trading-journal.html \
            --verify-url https://freerideinvestor.com/
