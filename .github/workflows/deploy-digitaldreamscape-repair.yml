name: Deploy DigitalDreamscape repair

on:
  push:
    branches:
      - cursor/repair-digitaldreamscape-white-screen-0b91
    paths:
      - .github/workflows/deploy-digitaldreamscape-repair.yml

concurrency:
  group: digitaldreamscape-repair-deploy
  cancel-in-progress: true

jobs:
  repair:
    name: Repair WordPress bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_HOST: 157.173.214.121
          HOSTINGER_PORT: "65002"
        run: |
          set -euo pipefail
          test -n "$HOSTINGER_SSH_PRIVATE_KEY"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf "%s\n" "$HOSTINGER_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_hostinger"
          chmod 600 "$HOME/.ssh/id_hostinger"
          ssh-keyscan -T 20 -p "$HOSTINGER_PORT" "$HOSTINGER_HOST" >> "$HOME/.ssh/known_hosts" || true

      - name: Repair wp-config bootstrap block
        env:
          HOSTINGER_HOST: 157.173.214.121
          HOSTINGER_USER: u996867598
          HOSTINGER_PORT: "65002"
          REMOTE_ROOT: /home/u996867598/domains/digitaldreamscape.site/public_html
        run: |
          set -euo pipefail
          remote="${HOSTINGER_USER}@${HOSTINGER_HOST}"
          ssh_base=(ssh -i "$HOME/.ssh/id_hostinger" -p "$HOSTINGER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ConnectionAttempts=1 "$remote")
          scp_base=(scp -i "$HOME/.ssh/id_hostinger" -P "$HOSTINGER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ConnectionAttempts=1)

          repair_script="/tmp/repair-digitaldreamscape-wp-config-${GITHUB_RUN_ID}.php"
          cat > "$repair_script" <<'PHP'
          <?php
          $root = rtrim($argv[1] ?? '', '/');
          $runId = preg_replace('/[^0-9A-Za-z_.-]/', '', $argv[2] ?? date('YmdHis'));
          $path = $root . '/wp-config.php';

          if (!is_file($path) || !is_readable($path) || !is_writable($path)) {
              fwrite(STDERR, "WP_CONFIG_NOT_EDITABLE\n");
              exit(1);
          }

          $text = file_get_contents($path);
          if ($text === false) {
              fwrite(STDERR, "WP_CONFIG_READ_FAILED\n");
              exit(1);
          }

          $pattern = "/\n\s*if\s*\(\s*!\s*defined\s*\(\s*['\"]ABSPATH['\"]\s*\)\s*\).*$/s";
          if (!preg_match($pattern, $text, $match, PREG_OFFSET_CAPTURE)) {
              fwrite(STDERR, "ABSPATH_BOOTSTRAP_MARKER_MISSING\n");
              exit(1);
          }

          $backup = $path . '.bak.' . $runId;
          if (!copy($path, $backup)) {
              fwrite(STDERR, "WP_CONFIG_BACKUP_FAILED\n");
              exit(1);
          }

          $prefix = rtrim(substr($text, 0, $match[0][1]));
          $bootstrap = <<<'BOOTSTRAP'
          /** Absolute path to the WordPress directory. */
          if ( ! defined( 'ABSPATH' ) ) {
              define( 'ABSPATH', __DIR__ . '/' );
          }

          /** Sets up WordPress vars and included files. */
          require_once ABSPATH . 'wp-settings.php';
          BOOTSTRAP;

          $newText = $prefix . "\n\n" . $bootstrap . "\n";

          $tokens = token_get_all($newText);
          $depth = 0;
          $line = 1;
          $unmatchedCloseLines = array();
          foreach ($tokens as $token) {
              if (is_array($token)) {
                  $line = $token[2] + substr_count($token[1], "\n");
                  continue;
              }

              if ($token === "{") {
                  $depth++;
              } elseif ($token === "}") {
                  if ($depth === 0) {
                      $unmatchedCloseLines[$line] = true;
                  } else {
                      $depth--;
                  }
              } elseif ($token === "\n") {
                  $line++;
              }
          }

          if ($unmatchedCloseLines) {
              $lines = explode("\n", $newText);
              foreach (array_reverse(array_keys($unmatchedCloseLines)) as $badLine) {
                  $index = $badLine - 1;
                  if (isset($lines[$index]) && trim($lines[$index]) === "}") {
                      unset($lines[$index]);
                      echo "REMOVED_UNMATCHED_CLOSE_BRACE_LINE=$badLine\n";
                  }
              }
              $newText = implode("\n", $lines);
          }

          if (file_put_contents($path, $newText) === false) {
              fwrite(STDERR, "WP_CONFIG_WRITE_FAILED\n");
              exit(1);
          }

          echo "WP_CONFIG_BOOTSTRAP_REPAIRED\n";
          echo "WP_CONFIG_BACKUP=$backup\n";
          PHP

          "${scp_base[@]}" "$repair_script" "$remote:$repair_script"
          "${ssh_base[@]}" "php '$repair_script' '$REMOTE_ROOT' '${GITHUB_RUN_ID}' && php -d display_errors=1 -d error_reporting=E_ALL -l '$REMOTE_ROOT/wp-config.php' 2>&1 && rm -f '$repair_script'"

      - name: Diagnose WordPress after repair
        env:
          HOSTINGER_HOST: 157.173.214.121
          HOSTINGER_USER: u996867598
          HOSTINGER_PORT: "65002"
          REMOTE_ROOT: /home/u996867598/domains/digitaldreamscape.site/public_html
        run: |
          set -euo pipefail
          remote="${HOSTINGER_USER}@${HOSTINGER_HOST}"
          ssh_base=(ssh -i "$HOME/.ssh/id_hostinger" -p "$HOSTINGER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ConnectionAttempts=1 "$remote")
          "${ssh_base[@]}" "set +e
            cd '$REMOTE_ROOT'
            echo '== PHP VERSION =='
            php -v | sed -n '1,2p'
            echo '== WP CONFIG LINT =='
            php -l wp-config.php
            echo '== WORDPRESS CLI THEME CHECK =='
            if command -v wp >/dev/null 2>&1; then
              wp --path='$REMOTE_ROOT' option get stylesheet 2>&1
              wp --path='$REMOTE_ROOT' option get template 2>&1
            else
              echo 'WP_CLI_MISSING'
            fi
            echo '== DIRECT PHP BOOTSTRAP =='
            timeout 20 php -d display_errors=1 -d log_errors=0 -d error_reporting=E_ALL index.php 2>&1 | sed -n '1,120p'
            echo '== DEBUG LOG TAIL =='
            if [ -f wp-content/debug.log ]; then
              tail -n 80 wp-content/debug.log
            else
              echo 'DEBUG_LOG_MISSING'
            fi
          "

      - name: Verify live site
        run: |
          set -euo pipefail
          status="$(curl -L -s -o /tmp/digitaldreamscape.html -w '%{http_code}' --max-time 30 "https://digitaldreamscape.site/?nocache=${GITHUB_RUN_ID}")"
          echo "HTTP_STATUS=$status"
          if [ "$status" != "200" ]; then
            sed -n '1,80p' /tmp/digitaldreamscape.html
            exit 1
          fi
          sed -n '1,40p' /tmp/digitaldreamscape.html
