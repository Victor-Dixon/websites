name: Deploy WeAreSwarm Online

on:
  workflow_dispatch:
  push:
    branches:
      - cursor/repair-weareswarm-white-screen-0b91
    paths:
      - .github/workflows/deploy-weareswarm-online.yml
      - routes/weareswarm.online/**
      - _deploy/weareswarm/level5/**

concurrency:
  group: weareswarm-online-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload services redesign and www canonical rules
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_HOST: 157.173.214.121
          HOSTINGER_PORT: "65002"
        run: |
          set -euo pipefail
          test -n "$HOSTINGER_SSH_PRIVATE_KEY"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf "%s\n" "$HOSTINGER_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_hostinger"
          chmod 600 "$HOME/.ssh/id_hostinger"
          ssh-keyscan -T 20 -p "$HOSTINGER_PORT" "$HOSTINGER_HOST" >> "$HOME/.ssh/known_hosts" || true

      - name: Upload dreamos-services, skill-tree, and patch www canonical rules
        env:
          HOSTINGER_HOST: 157.173.214.121
          HOSTINGER_USER: u996867598
          HOSTINGER_PORT: "65002"
          REMOTE_ROOT: /home/u996867598/domains/weareswarm.online/public_html
        run: |
          set -euo pipefail
          remote="${HOSTINGER_USER}@${HOSTINGER_HOST}"
          ssh_base=(ssh -i "$HOME/.ssh/id_hostinger" -p "$HOSTINGER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=45 -o ConnectionAttempts=3 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 "$remote")
          scp_base=(scp -i "$HOME/.ssh/id_hostinger" -P "$HOSTINGER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=45 -o ConnectionAttempts=3 -o ServerAliveInterval=15 -o ServerAliveCountMax=4)

          "${ssh_base[@]}" "set -e
            mkdir -p '$REMOTE_ROOT/dreamos-services' '$REMOTE_ROOT/skill-tree'
            if [ -f '$REMOTE_ROOT/dreamos-services/index.html' ]; then cp '$REMOTE_ROOT/dreamos-services/index.html' '$REMOTE_ROOT/dreamos-services/index.html.bak.${GITHUB_RUN_ID}'; fi
            if [ -f '$REMOTE_ROOT/skill-tree/index.html' ]; then cp '$REMOTE_ROOT/skill-tree/index.html' '$REMOTE_ROOT/skill-tree/index.html.bak.${GITHUB_RUN_ID}'; fi
            if [ -f '$REMOTE_ROOT/.htaccess' ]; then cp '$REMOTE_ROOT/.htaccess' '$REMOTE_ROOT/.htaccess.bak.${GITHUB_RUN_ID}'; fi
          "

          "${scp_base[@]}" "routes/weareswarm.online/dreamos-services/index.html" "$remote:$REMOTE_ROOT/dreamos-services/index.html"
          "${scp_base[@]}" "routes/weareswarm.online/skill-tree/index.html" "$remote:$REMOTE_ROOT/skill-tree/index.html"

          # Level 5 scoreboard/API deploy
          "${ssh_base[@]}" "mkdir -p '$REMOTE_ROOT/level5/api' '$REMOTE_ROOT/level5/missions'"
          "${scp_base[@]}" "_deploy/weareswarm/level5/index.html" "$remote:$REMOTE_ROOT/level5/index.html"
          "${scp_base[@]}" "_deploy/weareswarm/level5/missions/index.html" "$remote:$REMOTE_ROOT/level5/missions/index.html"
          "${scp_base[@]}" "_deploy/weareswarm/level5/data_scoreboard_static_fallback.json" "$remote:$REMOTE_ROOT/level5/data_scoreboard_static_fallback.json"
          "${scp_base[@]}" "_deploy/weareswarm/level5/api/.htaccess" "$remote:$REMOTE_ROOT/level5/api/.htaccess"
          "${scp_base[@]}" "_deploy/weareswarm/level5/api/db.php" "$remote:$REMOTE_ROOT/level5/api/db.php"
          "${scp_base[@]}" "_deploy/weareswarm/level5/api/scoreboard.php" "$remote:$REMOTE_ROOT/level5/api/scoreboard.php"
          "${scp_base[@]}" "routes/weareswarm.online/htaccess-canonical-www.snippet" "$remote:/tmp/weareswarm-online-htaccess-snippet.txt"

          "${ssh_base[@]}" "set -e
            chmod 644 '$REMOTE_ROOT/dreamos-services/index.html' '$REMOTE_ROOT/skill-tree/index.html'
            ht='$REMOTE_ROOT/.htaccess'
            touch \"\$ht\"
            if ! grep -q 'WeAreSwarm.online canonical host' \"\$ht\"; then
              tmp=\"/tmp/weareswarm-online-htaccess-${GITHUB_RUN_ID}.txt\"
              cat /tmp/weareswarm-online-htaccess-snippet.txt > \"\$tmp\"
              echo '' >> \"\$tmp\"
              cat \"\$ht\" >> \"\$tmp\"
              mv \"\$tmp\" \"\$ht\"
            fi
            rm -f /tmp/weareswarm-online-htaccess-snippet.txt
          "

      - name: Verify www canonical and services redesign
        run: |
          set -euo pipefail
          apex="$(curl -sI --max-time 20 'https://weareswarm.online/' | awk 'toupper($1) ~ /^HTTP/ {code=$2} /^location:/ {loc=$2} END {print code "|" loc}')"
          echo "APEX_ROOT=$apex"
          echo "$apex" | grep -q '^301|https://www.weareswarm.online/'

          svc_code="$(curl -s -o /tmp/weareswarm-online-services.html -w '%{http_code}' --max-time 20 'https://www.weareswarm.online/dreamos-services/?cache='"${GITHUB_RUN_ID}")"
          echo "WWW_SERVICES=$svc_code"
          [ "$svc_code" = "200" ]
          grep -q 'Ship automation that survives real mess' /tmp/weareswarm-online-services.html
          grep -q 'class="nav"' /tmp/weareswarm-online-services.html
          grep -q 'Command Center' /tmp/weareswarm-online-services.html

          hub_code="$(curl -s -o /tmp/weareswarm-online-root.html -w '%{http_code}' --max-time 20 'https://www.weareswarm.online/?cache='"${GITHUB_RUN_ID}")"
          echo "WWW_ROOT=$hub_code"
          [ "$hub_code" = "200" ]
          grep -q 'Dream.OS Command Center' /tmp/weareswarm-online-root.html

          tree_code="$(curl -s -o /tmp/weareswarm-online-skill-tree.html -w '%{http_code}' --max-time 20 'https://www.weareswarm.online/skill-tree/?cache='"${GITHUB_RUN_ID}")"
          echo "WWW_SKILL_TREE=$tree_code"
          [ "$tree_code" = "200" ]
          grep -q 'Swarm Skill Tree' /tmp/weareswarm-online-skill-tree.html
          grep -q 'Command Core' /tmp/weareswarm-online-skill-tree.html
          grep -q 'site-header' /tmp/weareswarm-online-skill-tree.html

          # Level 5 scoreboard/API verify
          level5_code="$(curl -s -o /tmp/weareswarm-online-level5.html -w '%{http_code}' --max-time 20 'https://www.weareswarm.online/level5/?cache='"${GITHUB_RUN_ID}")"
          echo "https://www.weareswarm.online/level5/ => $level5_code"
          test "$level5_code" = "200"
          missions_code="$(curl -s -o /tmp/weareswarm-online-level5-missions.html -w '%{http_code}' --max-time 20 'https://www.weareswarm.online/level5/missions/?cache='"${GITHUB_RUN_ID}")"
          echo "https://www.weareswarm.online/level5/missions/ => $missions_code"
          test "$missions_code" = "200"
          api_body="$(curl -sL --max-time 20 'https://www.weareswarm.online/level5/api/scoreboard.php?cache='"${GITHUB_RUN_ID}")"
          echo "$api_body"
          ! echo "$api_body" | grep -q 'Missing DB env. Set LEVEL5_DB_NAME and LEVEL5_DB_USER.'
          echo "$api_body" | grep -Eq 'Missing DB config|DB connection failed|"ok":true'
