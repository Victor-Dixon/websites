name: Deploy WeAreSwarm Online Kids Planner

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'routes/weareswarm.online/kids-planner/**'
      - 'routes/weareswarm.online/tasks/**'
      - 'routes/weareswarm.online/roadmap/**'
      - 'routes/weareswarm.online/data/planner/kids_tasks.json'
      - 'routes/weareswarm.online/data/planner/all_tasks.json'
      - '.github/workflows/deploy-weareswarm-online-kids-planner.yml'

jobs:
  deploy-online-planner-routes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          set -euo pipefail
          test -n "$HOSTINGER_SSH_PRIVATE_KEY"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf "%s\n" "$HOSTINGER_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_hostinger"
          chmod 600 "$HOME/.ssh/id_hostinger"
          ssh-keyscan -T 20 -p "$HOSTINGER_PORT" "$HOSTINGER_HOST" >> "$HOME/.ssh/known_hosts" || true

      - name: Deploy planner routes to weareswarm.online
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          REMOTE_ROOT: /home/u996867598/domains/weareswarm.online/public_html
        run: |
          set -euo pipefail

          test -f routes/weareswarm.online/kids-planner/index.html
          test -f routes/weareswarm.online/tasks/index.html
          test -f routes/weareswarm.online/roadmap/index.html
          test -f routes/weareswarm.online/data/planner/kids_tasks.json

          ssh -p "$HOSTINGER_PORT" \
            -i "$HOME/.ssh/id_hostinger" \
            "$HOSTINGER_USER@$HOSTINGER_HOST" \
            "mkdir -p '$REMOTE_ROOT/kids-planner' '$REMOTE_ROOT/tasks' '$REMOTE_ROOT/roadmap' '$REMOTE_ROOT/data/planner'"

          # Dream.OS canonical nav assets
          if [ -d routes/weareswarm.online/assets ]; then
            rsync -az --delete -e "ssh -p $HOSTINGER_PORT -i $HOME/.ssh/id_hostinger" routes/weareswarm.online/assets/ "$HOSTINGER_USER@$HOSTINGER_HOST:$REMOTE_ROOT/assets/"
          fi

          rsync -az --delete -e "ssh -p $HOSTINGER_PORT -i $HOME/.ssh/id_hostinger" routes/weareswarm.online/kids-planner/ "$HOSTINGER_USER@$HOSTINGER_HOST:$REMOTE_ROOT/kids-planner/"
          rsync -az --delete -e "ssh -p $HOSTINGER_PORT -i $HOME/.ssh/id_hostinger" routes/weareswarm.online/tasks/ "$HOSTINGER_USER@$HOSTINGER_HOST:$REMOTE_ROOT/tasks/"
          rsync -az --delete -e "ssh -p $HOSTINGER_PORT -i $HOME/.ssh/id_hostinger" routes/weareswarm.online/roadmap/ "$HOSTINGER_USER@$HOSTINGER_HOST:$REMOTE_ROOT/roadmap/"

          rsync -az -e "ssh -p $HOSTINGER_PORT -i $HOME/.ssh/id_hostinger" routes/weareswarm.online/data/planner/kids_tasks.json "$HOSTINGER_USER@$HOSTINGER_HOST:$REMOTE_ROOT/data/planner/kids_tasks.json"

          if [ -f routes/weareswarm.online/data/planner/all_tasks.json ]; then
            rsync -az -e "ssh -p $HOSTINGER_PORT -i $HOME/.ssh/id_hostinger" routes/weareswarm.online/data/planner/all_tasks.json "$HOSTINGER_USER@$HOSTINGER_HOST:$REMOTE_ROOT/data/planner/all_tasks.json"
          fi

      - name: Verify live planner routes
        run: |
          set -euo pipefail
          sleep 3

          curl -LfsS "https://www.weareswarm.online/kids-planner/?cache=${GITHUB_RUN_ID}" -o /tmp/kids-planner.html
          grep -q 'data-canonical-nav="weareswarm-online"' /tmp/kids-planner.html
          grep -q '/assets/css/nav-shell.css' /tmp/kids-planner.html
          grep -q '/assets/js/nav-fallback.js' /tmp/kids-planner.html

          curl -LfsS "https://www.weareswarm.online/tasks/?cache=${GITHUB_RUN_ID}" -o /tmp/tasks.html
          grep -q 'data-canonical-nav="weareswarm-online"' /tmp/tasks.html
          grep -q '/assets/css/nav-shell.css' /tmp/tasks.html
          grep -q '/assets/js/nav-fallback.js' /tmp/tasks.html

          curl -LfsS "https://www.weareswarm.online/roadmap/?cache=${GITHUB_RUN_ID}" -o /tmp/roadmap.html
          grep -q 'data-canonical-nav="weareswarm-online"' /tmp/roadmap.html
          grep -q '/assets/css/nav-shell.css' /tmp/roadmap.html
          grep -q '/assets/js/nav-fallback.js' /tmp/roadmap.html

          curl -LfsS "https://www.weareswarm.online/data/planner/kids_tasks.json?cache=${GITHUB_RUN_ID}" -o /tmp/kids_tasks.json
          python3 -c 'import json; from pathlib import Path; data=json.loads(Path("/tmp/kids_tasks.json").read_text()); count=data.get("count", len(data.get("tasks", []))); print(f"LIVE_KIDS_FEED_COUNT={count}"); assert count >= 1'
