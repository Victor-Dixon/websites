name: 🚀 Deploy Websites

on:
  push:
    branches: [ main, master, production ]
    paths:
      - 'websites/**'
      - 'tools/**'
      - '!docs/**'
      - '!README.md'
      - '!*.md'

  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy to all websites'
        required: false
        type: boolean
        default: false
      specific_site:
        description: 'Deploy to specific site (leave empty for auto-detect)'
        required: false
        type: string

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for proper diff detection

    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        tools: composer

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 📦 Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install paramiko python-dotenv

    - name: 🔍 Validate PHP syntax
      run: |
        echo "🐘 Validating PHP syntax..."
        python ops/deployment/deployment_automation.py --validate

    - name: 🚀 Deploy websites
      env:
        DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        DEPLOY_HOSTING_PASSWORD: ${{ secrets.DEPLOY_HOSTING_PASSWORD }}
      run: |
        echo "🚀 Starting deployment..."

        if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.deploy_all }}" == "true" ]; then
          echo "🌐 Deploying to ALL websites (SSOT registry)..."
          python ops/deployment/unified_deployer.py --all
        elif [ -n "${{ github.event.inputs.specific_site }}" ]; then
          echo "🎯 Deploying to specific site: ${{ github.event.inputs.specific_site }}"
          python ops/deployment/unified_deployer.py --site "${{ github.event.inputs.specific_site }}"
        else
          echo "🔄 Auto-detecting changes and deploying..."
          python ops/deployment/deploy_on_push.py --auto
        fi

    - name: 🧹 Clear caches
      if: success()
      run: |
        echo "🧹 Clearing WordPress caches..."
        python ops/deployment/deployment_automation.py --clear-caches

    - name: 📊 Generate deployment report
      if: always()
      run: |
        echo "## 🚀 Deployment Report" >> $GITHUB_STEP_SUMMARY
        echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** $([[ ${{ job.status }} == 'success' ]] && echo '✅ Success' || echo '❌ Failed')" >> $GITHUB_STEP_SUMMARY

        if [ -f deployment.log ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Deployment Details" >> $GITHUB_STEP_SUMMARY
          cat deployment.log >> $GITHUB_STEP_SUMMARY
        fi

  notify:
    runs-on: ubuntu-latest
    needs: validate-and-deploy
    if: always()

    steps:
    - name: 📢 Send notification
      if: github.event_name == 'push'
      run: |
        STATUS=$([[ ${{ needs.validate-and-deploy.result }} == 'success' ]] && echo '✅ Success' || echo '❌ Failed')
        MESSAGE="🚀 Website Deployment $STATUS

Repository: ${{ github.repository }}
Branch: ${{ github.ref_name }}
Commit: ${{ github.sha }}
Triggered by: ${{ github.actor }}

Status: ${{ needs.validate-and-deploy.result }}"

        # You can add Slack, Discord, or email notifications here
        echo "$MESSAGE"
