<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream.OS — Join the Swarm</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');

  /* ── TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --border:    #222222;
    --amber:     #f5a623;
    --amber-dim: #7a5210;
    --red:       #e63946;
    --green:     #39d353;
    --text:      #d4d4d4;
    --muted:     #555555;
    --white:     #f0f0f0;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono:    'Space Mono', monospace;
    --font-body:    'Inter', sans-serif;
  }

  /* ── RESET ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }
  a { color: var(--amber); text-decoration: none; }
  a:hover { text-decoration: underline; }
  img { max-width: 100%; }

  /* ── SCANLINES OVERLAY (signature element) ──────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── NAVIGATION ─────────────────────────────────────────── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
    backdrop-filter: blur(8px);
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 1.5rem;
    letter-spacing: 0.05em;
    color: var(--amber);
  }
  .nav-logo span { color: var(--white); }
  .nav-links {
    display: flex;
    gap: 0.25rem;
    list-style: none;
  }
  .nav-links a {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    padding: 0.3rem 0.6rem;
    border: 1px solid transparent;
    border-radius: 2px;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .nav-links a:hover, .nav-links a.active {
    color: var(--amber);
    border-color: var(--amber-dim);
    text-decoration: none;
  }
  .nav-cta {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    background: var(--amber);
    color: #000;
    padding: 0.4rem 1rem;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .nav-cta:hover { opacity: 0.85; text-decoration: none; }
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--amber);
    transition: all 0.2s;
  }

  /* ── PAGES ──────────────────────────────────────────────── */
  .page { display: none; padding-top: 56px; min-height: 100vh; }
  .page.active { display: block; }

  /* ── SECTION UTILITY ────────────────────────────────────── */
  .section { padding: 5rem 2rem; max-width: 1100px; margin: 0 auto; }
  .section-sm { padding: 3rem 2rem; max-width: 1100px; margin: 0 auto; }

  /* ── HERO ───────────────────────────────────────────────── */
  .hero {
    min-height: calc(100vh - 56px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 4rem 2rem;
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
  }
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--amber);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .hero-eyebrow::before {
    content: '';
    display: inline-block;
    width: 32px;
    height: 1px;
    background: var(--amber);
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(4rem, 12vw, 9rem);
    line-height: 0.9;
    color: var(--white);
    letter-spacing: 0.02em;
    margin-bottom: 1rem;
  }
  .hero-title .accent { color: var(--amber); }
  .hero-subtitle {
    font-family: var(--font-mono);
    font-size: clamp(0.85rem, 2vw, 1rem);
    color: var(--text);
    max-width: 560px;
    margin-bottom: 3rem;
    line-height: 1.8;
    border-left: 2px solid var(--amber);
    padding-left: 1.25rem;
  }
  .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    background: var(--amber);
    color: #000;
    padding: 0.85rem 2rem;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
    cursor: pointer;
    border: none;
    display: inline-block;
  }
  .btn-primary:hover { opacity: 0.85; text-decoration: none; }
  .btn-ghost {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    background: transparent;
    color: var(--text);
    padding: 0.85rem 2rem;
    border-radius: 2px;
    border: 1px solid var(--border);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
    cursor: pointer;
    display: inline-block;
  }
  .btn-ghost:hover { border-color: var(--amber); color: var(--amber); text-decoration: none; }

  /* ── TICKER ─────────────────────────────────────────────── */
  .ticker-wrap {
    background: var(--amber);
    overflow: hidden;
    padding: 0.5rem 0;
  }
  .ticker {
    display: flex;
    white-space: nowrap;
    animation: ticker 30s linear infinite;
  }
  .ticker span {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    color: #000;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 2.5rem;
  }
  .ticker span::before { content: '◆  '; }
  @keyframes ticker {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── SWARM JOIN SECTION ─────────────────────────────────── */
  .swarm-section {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 5rem 2rem;
    text-align: center;
  }
  .swarm-tagline {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--white);
    margin-bottom: 1rem;
    letter-spacing: 0.05em;
  }
  .swarm-tagline .amber { color: var(--amber); }
  .swarm-copy {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--muted);
    max-width: 520px;
    margin: 0 auto 2.5rem;
    line-height: 1.8;
  }

  /* ── RANKS ──────────────────────────────────────────────── */
  .ranks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 3rem;
  }
  .rank-card {
    background: var(--surface);
    padding: 1.5rem 1.25rem;
    text-align: center;
    transition: background 0.15s;
  }
  .rank-card:hover { background: #161616; }
  .rank-level {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .rank-name {
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--amber);
    letter-spacing: 0.05em;
  }
  .rank-desc {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.5rem;
    line-height: 1.4;
  }

  /* ── HEADINGS UTILITY ───────────────────────────────────── */
  .page-heading {
    font-family: var(--font-display);
    font-size: clamp(3rem, 8vw, 6rem);
    color: var(--white);
    letter-spacing: 0.03em;
    line-height: 0.95;
    margin-bottom: 0.5rem;
  }
  .page-heading .accent { color: var(--amber); }
  .page-label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--amber);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .page-intro {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--muted);
    max-width: 600px;
    line-height: 1.8;
    margin-top: 1.5rem;
  }
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 3rem 0;
  }

  /* ── MANIFESTO PAGE ─────────────────────────────────────── */
  .manifesto-body {
    font-family: var(--font-mono);
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    line-height: 2;
    color: var(--text);
    max-width: 700px;
  }
  .manifesto-body p {
    margin-bottom: 1.25rem;
  }
  .manifesto-body .big {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--white);
    letter-spacing: 0.05em;
    line-height: 1;
    display: block;
    margin: 2.5rem 0 1rem;
  }
  .manifesto-body .highlight { color: var(--amber); }
  .manifesto-cta {
    margin-top: 4rem;
    border-top: 1px solid var(--border);
    padding-top: 3rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.75rem;
  }
  .manifesto-cta p {
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--white);
    letter-spacing: 0.05em;
  }

  /* ── START PAGE ─────────────────────────────────────────── */
  .start-steps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 3rem 0;
  }
  .start-step {
    background: var(--surface);
    padding: 2.5rem 2rem;
  }
  .step-num {
    font-family: var(--font-display);
    font-size: 4rem;
    color: var(--border);
    line-height: 1;
    margin-bottom: 1rem;
  }
  .step-title {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--amber);
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
  }
  .step-body {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.7;
  }

  /* ── CHALLENGE PAGE ─────────────────────────────────────── */
  .challenge-days {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 3rem 0;
  }
  .day-card {
    background: var(--surface);
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    gap: 1.5rem;
    padding: 1.5rem 2rem;
    transition: background 0.15s;
    cursor: default;
  }
  .day-card:hover { background: #161616; }
  .day-num {
    font-family: var(--font-display);
    font-size: 2.5rem;
    color: var(--amber-dim);
    letter-spacing: 0.05em;
    text-align: center;
  }
  .day-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .day-title {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--white);
    letter-spacing: 0.04em;
    margin-top: 0.15rem;
  }
  .day-badge {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    white-space: nowrap;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── PROOF PAGE ─────────────────────────────────────────── */
  .proof-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 3rem 0;
  }
  .proof-card {
    background: var(--surface);
    padding: 1.75rem;
  }
  .proof-status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }
  .proof-tag {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.pending { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
  .proof-field {
    margin-bottom: 0.85rem;
  }
  .proof-field-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--amber);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  .proof-field-value {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.5;
  }
  .proof-field-value.placeholder {
    color: var(--muted);
    font-style: italic;
  }
  .proof-submit-banner {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 3rem;
    text-align: center;
    margin-top: 1px;
  }
  .proof-submit-banner p {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  /* ── OPERATORS PAGE ─────────────────────────────────────── */
  .badges-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 3rem 0;
  }
  .badge-card {
    background: var(--surface);
    padding: 2rem 1.75rem;
    transition: background 0.15s;
  }
  .badge-card:hover { background: #161616; }
  .badge-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
  }
  .badge-name {
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--amber);
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }
  .badge-req {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .leaderboard {
    margin: 3rem 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .lb-header {
    background: var(--border);
    padding: 0.75rem 1.5rem;
    display: grid;
    grid-template-columns: 40px 1fr 120px 100px;
    gap: 1rem;
  }
  .lb-col {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .lb-row {
    background: var(--surface);
    padding: 1rem 1.5rem;
    display: grid;
    grid-template-columns: 40px 1fr 120px 100px;
    gap: 1rem;
    align-items: center;
    border-top: 1px solid var(--border);
    transition: background 0.15s;
  }
  .lb-row:hover { background: #161616; }
  .lb-rank {
    font-family: var(--font-display);
    font-size: 1.2rem;
    color: var(--muted);
  }
  .lb-rank.gold   { color: #ffd700; }
  .lb-rank.silver { color: #c0c0c0; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-name {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text);
  }
  .lb-badge {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--amber);
    letter-spacing: 0.05em;
  }
  .lb-proof {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--green);
  }

  /* ── FOOTER ─────────────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    padding: 3rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  .footer-logo {
    font-family: var(--font-display);
    font-size: 1.2rem;
    color: var(--amber);
  }
  .footer-links {
    display: flex;
    gap: 1.5rem;
    list-style: none;
  }
  .footer-links a {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: color 0.15s;
  }
  .footer-links a:hover { color: var(--amber); text-decoration: none; }
  .footer-copy {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* ── RITUAL BLOCK ───────────────────────────────────────── */
  .ritual-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    padding: 2rem;
    border-radius: 2px;
    margin: 2rem 0;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text);
    line-height: 2;
  }
  .ritual-block .ritual-title {
    font-family: var(--font-display);
    font-size: 1.2rem;
    color: var(--amber);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }
  .ritual-block code {
    color: var(--green);
  }

  /* ── MORNING MISSION WIDGET ─────────────────────────────── */
  .mission-widget {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 3rem 0;
    max-width: 600px;
  }
  .mission-header {
    background: var(--amber);
    padding: 0.75rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mission-header-title {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    color: #000;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .mission-header-date {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: #000;
    opacity: 0.6;
  }
  .mission-body { padding: 1.75rem; }
  .mission-headline {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--white);
    letter-spacing: 0.04em;
    margin-bottom: 1rem;
  }
  .mission-options {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .mission-options li {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--muted);
    padding: 0.6rem 1rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .mission-options li::before {
    content: attr(data-n);
    color: var(--amber);
    font-size: 0.65rem;
    min-width: 16px;
  }
  .mission-options li:hover {
    border-color: var(--amber-dim);
    color: var(--text);
    background: rgba(245,166,35,0.05);
  }
  .mission-options li.selected {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(245,166,35,0.08);
  }


  /* ── CLOSEOUT TEMPLATE ──────────────────────────────────── */
  .closeout-template {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    line-height: 2;
    color: var(--text);
    margin: 2rem 0;
  }
  .closeout-template .field-label {
    color: var(--amber);
    display: inline-block;
    min-width: 100px;
  }
  .closeout-template .field-value {

<script>
  // ── NAVIGATION ────────────────────────────────────────────
  function nav(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    const target = document.getElementById('page-' + page);
    if (target) { target.classList.add('active'); window.scrollTo(0,0); }
    const link = document.querySelector('[data-page="' + page + '"]');
    if (link) link.classList.add('active');
    // close mobile menu
    document.getElementById('navLinks').classList.remove('open');
    return false;
  }

  // ── HAMBURGER ─────────────────────────────────────────────
  function toggleMenu() {
    document.getElementById('navLinks').classList.toggle('open');
  }

  // ── MISSION DATE ──────────────────────────────────────────
  const el = document.getElementById('missionDate');
  if (el) {
    const d = new Date();
    el.textContent = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  }

  // ── MISSION SELECTOR ──────────────────────────────────────
  function selectMission(item) {
    document.querySelectorAll('.mission-options li').forEach(li => li.classList.remove('selected'));
    item.classList.add('selected');
  }

  // ── HASH ROUTING ──────────────────────────────────────────
  const hash = window.location.hash.replace('#','');
  const validPages = ['home','manifesto','start','challenge','proof','operators'];
  if (hash && validPages.includes(hash)) nav(hash);
  else nav('home');
</script>
