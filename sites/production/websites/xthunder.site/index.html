<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="xthunder — warm bakes and cozy moments. Handcrafted breads and pastries, baked daily with care." />
  <title>xthunder</title>
  <style>
    :root {
      --bg: #2c1810;
      --surface: #3d2418;
      --text: #fff8f0;
      --muted: #d4b896;
      --accent: #e8a54b;
      --warm: #c45c26;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(160deg, var(--bg) 0%, #1a0f0a 100%);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      text-align: center;
    }
    .brand {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 400;
      margin: 0 0 1rem;
      color: var(--text);
    }
    .lede {
      color: var(--muted);
      font-size: 1.1rem;
      margin: 0 0 2.5rem;
      font-style: italic;
    }
    section {
      background: var(--surface);
      border: 1px solid rgba(232, 165, 75, 0.25);
      border-radius: 12px;
      padding: 1.75rem 1.5rem;
      text-align: left;
    }
    h2 {
      font-size: 1.25rem;
      margin: 0 0 0.75rem;
      color: var(--accent);
      font-weight: 600;
    }
    p { margin: 0; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="brand">xthunder</p>
    <h1>Warm Bakes, Cozy Moments</h1>
    <p class="lede">Handcrafted breads and pastries, baked daily with care.</p>
    <section>
      <h2>Fresh Bakes</h2>
      <p>Handcrafted daily with love, from crusty breads to sweet treats.</p>
    </section>
  </div>
</body>
</html>
