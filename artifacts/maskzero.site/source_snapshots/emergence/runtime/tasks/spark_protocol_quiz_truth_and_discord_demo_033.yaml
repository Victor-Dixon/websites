acceptance_criteria:
  - adaptive quiz completes without freeze across deterministic and mixed answer paths
  - answered qids persist correctly after affinity transition
  - completed quiz builds locked deterministic character sheet
  - locked sheet includes canonical version field and non-empty tier
  - percentile remains bounded and deterministic
  - character save/load round-trips without mutation
  - Discord seed content includes deterministic locked character presentation
  - AI image prompt artifact is emitted from locked sheet truth
verification:
  - node --test tests/e2e/quiz_truth_flow.e2e.test.js
  - node --test tests/scoring/locked_sheet_contract.test.js
  - node --test tests/discord/character_sheet_render.test.mjs
